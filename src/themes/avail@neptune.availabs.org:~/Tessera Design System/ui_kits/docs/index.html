// ---- bundled components ----

// === Wordmark.jsx ===
// Wordmark.jsx — inline-SVG version of the Tessera wordmark.
// Uses currentColor so it inherits color from its parent.

function Wordmark({ size = 28, accent = "#B5532C", color = "currentColor" }) {
  // viewBox 460 96 — 4.79:1 ratio
  const w = size * 4.79;
  return (
    <svg
      viewBox="0 0 460 96"
      width={w}
      height={size}
      fill="none"
      aria-label="Tessera"
      role="img"
    >
      <rect x="20" y="32" width="32" height="32" fill={accent} />
      <text
        x="68"
        y="64"
        fontFamily='"Newsreader", "Tiempos Headline", Georgia, serif'
        fontWeight="500"
        fontSize="56"
        letterSpacing="-0.012em"
        fill={color}
      >
        Tessera
      </text>
    </svg>
  );
}

function Monogram({ size = 24, color = "currentColor", accent }) {
  return (
    <svg viewBox="0 0 96 96" width={size} height={size} fill="none" aria-hidden="true">
      <rect x="14" y="14" width="18" height="18" fill={color} />
      <rect x="34" y="14" width="18" height="18" fill={accent || color} />
      <rect x="54" y="14" width="18" height="18" fill={color} />
      <rect x="34" y="34" width="18" height="18" fill={color} />
      <rect x="34" y="54" width="18" height="18" fill={color} />
    </svg>
  );
}

Object.assign(window, { Wordmark, Monogram });


// === DocsHeader.jsx ===

// === CodeBlock.jsx ===
// CodeBlock.jsx
function CodeBlock({ caption, language, children }) {
  return (
    <figure style={cbStyles.fig}>
      <pre style={cbStyles.pre}><code>{children}</code></pre>
      {(caption || language) && (
        <figcaption style={cbStyles.cap}>
          <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--fg-subtle)", textTransform: "uppercase", letterSpacing: "0.06em" }}>
            {language || "code"}
          </span>
          {caption && <span style={{ fontFamily: "var(--font-sans)", fontSize: 12, color: "var(--fg-muted)" }}>{caption}</span>}
        </figcaption>
      )}
    </figure>
  );
}

const cbStyles = {
  fig: { margin: "16px 0 24px" },
  pre: {

    fontSize: 13,

function DocsPage() {
  const otp = [
    { id: "overview",  label: "Overview",            depth: 2 },
    { id: "anatomy",   label: "Anatomy of a pattern", depth: 2 },
    { id: "kinds",     label: "Kinds",               depth: 2 },
    { id: "kinds-tab", label: "Table",               depth: 3 },
    { id: "kinds-cal", label: "Calendar",            depth: 3 },
    { id: "kinds-pro", label: "Prose",               depth: 3 },
    { id: "compose",   label: "Composing a page",    depth: 2 },
    { id: "publish",   label: "Publishing",          depth: 2 },
    { id: "see-also",  label: "See also",            depth: 2 },
  ];

  return (
    <>
      <DocsHeader />

      <div style={{ maxWidth: 1280, margin: "0 auto", padding: "0 32px", display: "flex", gap: 32, alignItems: "flex-start" }}>
        <DocsSidebar active="ref-patterns" />

        <article style={{ flex: 1, minWidth: 0, padding: "32px 0 96px", maxWidth: 720 }}>
          <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--fg-muted)", letterSpacing: "0.06em", textTransform: "uppercase", display: "flex", gap: 12, alignItems: "center" }}>
            <span>Reference</span>
            <span style={{ color: "var(--fg-subtle)" }}>/</span>
            <span style={{ color: "var(--fg)" }}>Patterns</span>
          </div>

          <h1 id="overview" style={hStyles.h1}>Patterns</h1>

          <p style={pStyles.lede}>
            A pattern is the shape of a section. It tells Tessera which rows
            to fetch, how to fetch them, and how to render them. The same
            primitive that backs a homepage block also backs a chart, a
            table, or a map.
          </p>

          <p style={pStyles.body}>
            Patterns are stored as ordinary rows in the <code>patterns</code>
            table. They reference a dataset, a query, and a rendering. A
            pattern is small &mdash; the rendering is just metadata. The
            data is somewhere else.
          </p>

          <h2 id="anatomy" style={hStyles.h2}>Anatomy of a pattern</h2>

          <p style={pStyles.body}>
            A pattern is a typed row with four required fields and several
            optional ones.
          </p>

          <CodeBlock language="sql" caption="The minimum schema, abbreviated.">
{`CREATE TABLE patterns (
  id         bigint PRIMARY KEY,
  slug       text   NOT NULL UNIQUE,
  renders_as text   NOT NULL,   -- 'table' | 'calendar' | 'prose' | 'chart' | 'map'
  dataset    text,              -- e.g. 'shows' or NULL for prose
  query      text,              -- SQL or query DSL fragment
  created_at timestamptz DEFAULT now(),
  updated_at timestamptz DEFAULT now()
);`}
          </CodeBlock>

          <p style={pStyles.body}>
            Slugs are namespaced: <code>station.now_playing</code>,
            <code>civic.indicator_grid</code>, <code>archive.bibliography</code>.
            The first segment denotes the site, the second denotes the
            pattern's role within that site.
          </p>

          <h2 id="kinds" style={hStyles.h2}>Kinds</h2>

          <p style={pStyles.body}>
            Tessera ships five built-in renderings. Custom renderings may be
            registered by a theme; see <a href="#">Themes &rarr; Custom
            renderings</a>.
          </p>

          <h3 id="kinds-tab" style={hStyles.h3}>Table</h3>
          <p style={pStyles.body}>
            A typed grid. Tabular figures, alternating row tints,
            hairline dividers. The most common pattern; the workhorse of
            the system.
          </p>

          <CodeBlock language="tessera">
{`pattern: station.archive
renders_as: table
dataset: shows
query: |
  SELECT * FROM shows
  ORDER BY date DESC
  LIMIT 24`}
          </CodeBlock>

          <h3 id="kinds-cal" style={hStyles.h3}>Calendar</h3>
          <p style={pStyles.body}>
            A grid keyed on a time column. Hour-of-day on the
            horizontal axis, day-of-week on the vertical. Custom keying
            via <code>calendar.key_x</code> and <code>calendar.key_y</code>.
          </p>

          <h3 id="kinds-pro" style={hStyles.h3}>Prose</h3>
          <p style={pStyles.body}>
            A single typed row treated as long-form. Use this for "About"
            pages, theory essays, and any surface where the row <em>is</em>
            the page.
          </p>

          <h2 id="compose" style={hStyles.h2}>Composing a page</h2>

          <p style={pStyles.body}>
            A page is itself a row of kind <code>page</code> that points
            at a list of patterns. The page does not store its sections;
            it stores their slugs.
          </p>

          <CodeBlock language="json" caption="A page row, with an ordered list of pattern slugs.">
{`{
  "id":   2060672,
  "slug": "station.home",
  "kind": "page",
  "sections": [
    "station.now_playing",
    "station.schedule",
    "station.archive"
  ]
}`}
          </CodeBlock>

          <h2 id="publish" style={hStyles.h2}>Publishing</h2>

          <p style={pStyles.body}>
            Publishing snapshots a page and its constituent patterns into
            an immutable revision. Old revisions are addressable; rollback
            is a row insert.
          </p>

          <h2 id="see-also" style={hStyles.h2}>See also</h2>
          <ul style={pStyles.ul}>
            <li><a href="#">Rows &mdash; the underlying primitive</a></li>
            <li><a href="#">Datasets &mdash; how data is sourced</a></li>
            <li><a href="#">Themes &mdash; custom renderings</a></li>
            <li><a href="#">Queries &mdash; the query DSL</a></li>
          </ul>

          {/* Footer */}
          <hr style={{ borderTop: "1px solid var(--rule)", margin: "48px 0 24px" }} />
          <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--fg-muted)", letterSpacing: "0.06em", textTransform: "uppercase" }}>
            <a href="#" style={{ color: "inherit", textDecoration: "none" }}>← Rows</a>
            <a href="#" style={{ color: "var(--fg-muted)", textDecoration: "none" }}>Edit this page on GitHub</a>
            <a href="#" style={{ color: "inherit", textDecoration: "none" }}>Datasets →</a>
          </div>
        </article>

        <OnThisPage items={otp} active="kinds" />
      </div>
    </>
  );
}

</script>
