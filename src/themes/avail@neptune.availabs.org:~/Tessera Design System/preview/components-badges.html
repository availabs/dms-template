<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:flex; gap: 8px; flex-wrap: wrap; align-items: center;">
    <span class="badge">Draft</span>
    <span class="badge badge-strong">Published</span>
    <span class="badge badge-accent">Live</span>
    <span class="badge badge-cool">Indexed</span>
    <span class="badge badge-warn">Stale</span>
  </div>
  <div style="margin-top: 14px; display:flex; gap: 8px; flex-wrap: wrap; align-items: center;">
    <span class="pill">id 2060672</span>
    <span class="pill">pattern: station.home</span>
    <span class="pill">last edited 4m ago</span>
  </div>
  <div style="margin-top: 16px; font-family: var(--font-mono); font-size:11px; color: var(--fg-subtle); letter-spacing: 0.06em; text-transform: uppercase;">
    badges square · pills full radius (the only place we use it)
  </div>
</body></html>
