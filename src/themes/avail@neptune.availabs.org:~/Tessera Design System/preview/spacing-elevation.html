<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body style="background:#F4F1EA;">
  <div style="display:flex; gap: 32px;">
    <div style="flex:1;">
      <div style="height:96px; background:#FBF9F4; border:1px solid #D9D2C2;"></div>
      <div style="margin-top:8px; font-family: var(--font-mono); font-size:11px; color:var(--fg-muted);">flat · default</div>
      <div style="font-family: var(--font-mono); font-size:11px; color:var(--fg-subtle);">1px grout-light border, no shadow</div>
    </div>
    <div style="flex:1;">
      <div style="height:96px; background:#FBF9F4; border:1px solid #D9D2C2; box-shadow: 0 1px 2px rgba(42,47,54,0.04);"></div>
      <div style="margin-top:8px; font-family: var(--font-mono); font-size:11px; color:var(--fg-muted);">lifted · modals only</div>
      <div style="font-family: var(--font-mono); font-size:11px; color:var(--fg-subtle);">0 1px 2px rgba(slate, 0.04)</div>
    </div>
  </div>
  <div style="margin-top: 22px; font-family: var(--font-sans); font-size:13px; color:var(--fg-muted); max-width: 560px; line-height: 1.5;">
    No glassmorphism. No drop-shadowed cards floating in space. One elevation step.
  </div>
</body></html>
