<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:flex; gap: 16px;">
    <div class="card" style="flex:1;">
      <div class="eyebrow">section</div>
      <div style="font-family: var(--font-display); font-size: 22px; font-weight:500; margin-top: 4px;">A typed row</div>
      <p class="body" style="font-size: 13px; margin-top: 6px; color: var(--fg-muted);">Bone surface · 1px grout-light border · no shadow.</p>
    </div>
    <div class="card card-lifted" style="flex:1;">
      <div class="eyebrow">lifted</div>
      <div style="font-family: var(--font-display); font-size: 22px; font-weight:500; margin-top: 4px;">A modal sheet</div>
      <p class="body" style="font-size: 13px; margin-top: 6px; color: var(--fg-muted);">Parchment surface · 1px border · subtle 2% slate shadow.</p>
    </div>
    <div class="card card-sunken" style="flex:1;">
      <div class="eyebrow">sunken</div>
      <div style="font-family: var(--font-display); font-size: 22px; font-weight:500; margin-top: 4px;">A code block</div>
      <p class="body" style="font-size: 13px; margin-top: 6px; color: var(--fg-muted);">Limestone surface — for code, terminals, raw data.</p>
    </div>
  </div>
</body></html>
