<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <!-- Tabs -->
  <div style="display:flex; gap: 32px; border-bottom: 1px solid #D9D2C2;">
    <div style="padding: 10px 0; font-family: var(--font-sans); font-weight:500; font-size:14px; color: var(--fg); border-bottom: 2px solid #2A2F36; margin-bottom: -1px;">Compose</div>
    <div style="padding: 10px 0; font-family: var(--font-sans); font-size:14px; color: var(--fg-muted);">Data</div>
    <div style="padding: 10px 0; font-family: var(--font-sans); font-size:14px; color: var(--fg-muted);">Theme</div>
    <div style="padding: 10px 0; font-family: var(--font-sans); font-size:14px; color: var(--fg-muted);">Publish</div>
  </div>

  <!-- Breadcrumb -->
  <div style="margin-top: 18px; display: flex; align-items: center; gap: 8px; font-family: var(--font-sans); font-size: 13px; color: var(--fg-muted);">
    <span>Sites</span>
    <span style="color: var(--fg-subtle);">→</span>
    <span>wcdb.fm</span>
    <span style="color: var(--fg-subtle);">→</span>
    <span>Patterns</span>
    <span style="color: var(--fg-subtle);">→</span>
    <span style="color: var(--fg);">station.home</span>
  </div>

  <!-- Pagination -->
  <div style="margin-top: 18px; display: flex; align-items: center; gap: 4px; font-family: var(--font-mono); font-size: 13px;">
    <button class="btn btn-tertiary btn-sm">←</button>
    <div style="padding: 4px 10px; color: var(--fg-muted);">01</div>
    <div style="padding: 4px 10px; color: var(--fg); border-bottom: 1px solid var(--fg);">02</div>
    <div style="padding: 4px 10px; color: var(--fg-muted);">03</div>
    <div style="padding: 4px 10px; color: var(--fg-muted);">04</div>
    <div style="padding: 4px 10px; color: var(--fg-subtle);">…</div>
    <div style="padding: 4px 10px; color: var(--fg-muted);">18</div>
    <button class="btn btn-tertiary btn-sm">→</button>
  </div>
</body></html>
