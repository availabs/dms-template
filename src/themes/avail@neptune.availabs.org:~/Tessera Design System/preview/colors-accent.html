<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
    <div class="swatch"><div class="chip" style="background:#B5532C"></div><div class="meta"><span class="name">Oxide</span><span class="hex">#B5532C</span></div><div class="eyebrow">primary accent</div></div>
    <div class="swatch"><div class="chip" style="background:#7F1D1D"></div><div class="meta"><span class="name">Tile</span><span class="hex">#7F1D1D</span></div><div class="eyebrow">deep emphasis</div></div>
    <div class="swatch"><div class="chip" style="background:#5D8A85"></div><div class="meta"><span class="name">Verdigris</span><span class="hex">#5D8A85</span></div><div class="eyebrow">secondary accent</div></div>
    <div class="swatch"><div class="chip" style="background:#B45309"></div><div class="meta"><span class="name">Ochre</span><span class="hex">#B45309</span></div><div class="eyebrow">warning / highlight</div></div>
  </div>
  <div style="margin-top:18px; font-family: var(--font-sans); font-size: 13px; color: var(--fg-muted); max-width: 520px; line-height: 1.5;">
    Used as emphasis, never decoration. Maximum 15% of any surface.
  </div>
</body></html>
