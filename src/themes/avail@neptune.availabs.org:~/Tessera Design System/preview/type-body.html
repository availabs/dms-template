<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:flex; flex-direction:column; gap: 12px;">
    <div style="display:flex; align-items:baseline; gap: 24px;">
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: 0.06em; min-width: 54px;">16 / 1.55</div>
      <div style="font-family: var(--font-sans); font-size: 16px; line-height: 1.55; max-width: 460px;">Body text. The default reading size — sentence case, ample line-height, optimized for considered scanning rather than rapid skim.</div>
    </div>
    <div style="display:flex; align-items:baseline; gap: 24px;">
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: 0.06em; min-width: 54px;">14 / 1.5</div>
      <div style="font-family: var(--font-sans); font-size: 14px; line-height: 1.5; max-width: 460px;">Body small. UI density text — table rows, form labels, secondary copy.</div>
    </div>
    <div style="display:flex; align-items:baseline; gap: 24px;">
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: 0.06em; min-width: 54px;">12 / 1.45</div>
      <div style="font-family: var(--font-sans); font-size: 12px; line-height: 1.45; color: var(--fg-muted); max-width: 460px;">Caption. Metadata, timestamps, footnotes — quiet by design.</div>
    </div>
  </div>
