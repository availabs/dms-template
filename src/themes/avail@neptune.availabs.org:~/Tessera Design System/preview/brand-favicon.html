<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:flex; align-items:flex-end; gap: 40px;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <img src="../assets/logos/favicon.svg" width="192" style="image-rendering: pixelated;" />
      <div style="font-family: var(--font-mono); font-size:10px; color: var(--fg-subtle);">192</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <img src="../assets/logos/favicon.svg" width="32" style="image-rendering: pixelated;" />
      <div style="font-family: var(--font-mono); font-size:10px; color: var(--fg-subtle);">32</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <img src="../assets/logos/favicon.svg" width="16" style="image-rendering: pixelated;" />
      <div style="font-family: var(--font-mono); font-size:10px; color: var(--fg-subtle);">16</div>
    </div>
    <div style="margin-left: 24px; font-family: var(--font-sans); font-size:13px; color: var(--fg-muted); max-width: 240px; line-height: 1.5;">
      Tilted tessera inset in a slate frame. The mark must hold at 16px.
    </div>
  </div>
</body></html>
