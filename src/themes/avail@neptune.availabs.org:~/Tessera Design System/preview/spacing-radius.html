<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:flex; gap: 36px; align-items:flex-end;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:72px; height:72px; background:#FBF9F4; border:1px solid #D9D2C2; border-radius:0;"></div>
      <div style="font-family: var(--font-mono); font-size:11px; color:var(--fg-muted);">0 · default</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:72px; height:72px; background:#FBF9F4; border:1px solid #D9D2C2; border-radius:2px;"></div>
      <div style="font-family: var(--font-mono); font-size:11px; color:var(--fg-muted);">2 · buttons</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:72px; height:72px; background:#FBF9F4; border:1px solid #D9D2C2; border-radius:4px;"></div>
      <div style="font-family: var(--font-mono); font-size:11px; color:var(--fg-muted);">4 · badges</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:72px; height:32px; background:#FBF9F4; border:1px solid #D9D2C2; border-radius:999px;"></div>
      <div style="font-family: var(--font-mono); font-size:11px; color:var(--fg-muted);">∞ · pills only</div>
    </div>
  </div>
  <div style="margin-top: 22px; font-family: var(--font-sans); font-size:13px; color:var(--fg-muted); max-width: 560px; line-height:1.5;">
    Square corners by default. Tiles do not have rounded corners. 2px and 4px are reserved for interactive elements that need affordance.
  </div>
</body></html>
