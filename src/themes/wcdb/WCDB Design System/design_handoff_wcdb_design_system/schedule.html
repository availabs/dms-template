<!doctype html>
<html lang="en" data-mode="dark" data-density="cozy">
<head>
<meta charset="utf-8"><title>WCDB — Schedule</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="styles/tokens.css"><link rel="stylesheet" href="styles/components.css">
</head>
<body><div id="app"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="scripts/tweaks.jsx"></script>
<script type="text/babel" src="scripts/shell.jsx"></script>
<script type="text/babel" src="scripts/wcdb-patterns.jsx"></script>
<script type="text/babel" src="scripts/mockup-shell.jsx"></script>
<script type="text/babel">
const SHOWS=[
['06:00','Morning Edition','Public Affairs','News'],
['09:00','Coffeehouse','Aimee Cole','Folk'],
['12:00','Lunch Counter','Daniel Yi','Talk'],
['14:00','Crate Digging','Jules Mazur','Hip-hop'],
['16:00','Drive Time','Hosts rotating','Variety'],
['18:00','Five Boroughs','Tasha Williams','Soul'],
['20:00','Stage Door','Jamie Reed','Sports'],
['22:00','Late Modernism','DJ Halftone','Indie',true],
['00:00','The Quiet Hours','Marisol Ng','Ambient'],
['02:00','Graveyard Shift','Ezra Park','Talk'],
];
function App(){return(
<MockupShell active="Schedule">
<section data-screen-label="Schedule" style={{padding:'24px 0 40px'}}>
<div className="uppercase-meta">SCHEDULE · WEEK OF MAR 03</div>
<h1 className="serif" style={{fontStyle:'italic',fontSize:'clamp(56px,7vw,96px)',lineHeight:0.95,letterSpacing:'-0.04em',margin:'20px 0 24px',fontWeight:400}}>This week on the air.</h1>
<p style={{color:'var(--ink-2)',fontSize:18,maxWidth:600,lineHeight:1.5}}>50+ student-run shows. All times Eastern. Tap any cell for episode archive.</p>
</section>
<section style={{margin:'24px 0'}}><DayStrip/></section>
<section style={{margin:'40px 0 80px'}}>
<div style={{background:'var(--bg-2)',border:'1px solid var(--line-1)',borderRadius:14,overflow:'hidden'}}>
{SHOWS.map((s,i)=>(
<div key={i} style={{
display:'grid',gridTemplateColumns:'120px 1fr 200px 120px',
padding:'22px 26px',gap:24,alignItems:'center',
borderTop:i===0?'none':'1px solid var(--line-1)',
background:s[4]?'rgba(255,59,47,0.04)':'transparent',
position:'relative',
}}>
<span className="mono" style={{fontSize:13,letterSpacing:'0.06em',color:s[4]?'var(--on-air)':'var(--ink-3)'}}>{s[0]} ET</span>
<span className="serif" style={{fontStyle:'italic',fontSize:24,letterSpacing:'-0.02em'}}>{s[1]}</span>
<span style={{fontSize:14,color:'var(--ink-2)'}}>{s[2]}</span>
<span style={{display:'flex',justifyContent:'flex-end',gap:10,alignItems:'center'}}>
<span className="wc-pill" style={{fontSize:10,padding:'2px 8px'}}>{s[3]}</span>
{s[4] && <span className="wc-pill wc-pill--onair">Live</span>}
</span>
</div>
))}
</div>
</section>
<WCDBTweaks/>
</MockupShell>
)}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script></body></html>
