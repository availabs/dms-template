<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>tessera · sign in</title>
<!-- apply stored light/dark choice before first paint -->
<script>(function(){try{var t=localStorage.getItem("t6-theme");if(t==="dark"||(!t&&window.matchMedia("(prefers-color-scheme: dark)").matches))document.documentElement.setAttribute("data-theme","dark")}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Caveat:wght@500;600;700&display=swap">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { theme: { extend: {
  colors: {
    paper:"var(--t-paper)", panel:"var(--t-panel)", well:"var(--t-well)",
    ink:"var(--t-ink)", graphite:"var(--t-graphite)", pencil:"var(--t-pencil)",
    rule:"var(--t-rule)", ruleStrong:"var(--t-rule-strong)",
    cobalt:"var(--t-cobalt)", cobaltDeep:"var(--t-cobalt-deep)", cobaltSoft:"var(--t-cobalt-soft)", accentInk:"var(--t-accent-ink)",
    marker:"var(--t-marker)", markerSoft:"var(--t-marker-soft)",
    go:"var(--t-go)", goSoft:"var(--t-go-soft)", amber:"var(--t-amber)", amberSoft:"var(--t-amber-soft)",
    brick:"var(--t-brick)", brickSoft:"var(--t-brick-soft)",
    board:"var(--t-board)", board2:"var(--t-board-2)", chalk:"var(--t-chalk)", chalkDim:"var(--t-chalk-dim)",
    scrim:"var(--t-scrim)",
  },
  fontFamily: {
    display:['"IBM Plex Sans"',"system-ui","sans-serif"], sans:['"IBM Plex Sans"',"system-ui","sans-serif"],
    mono:['"IBM Plex Mono"',"ui-monospace","monospace"], note:["Caveat",'"Segoe Print"',"cursive"],
  },
  boxShadow: { lift:"var(--t-shadow-lift)", drag:"var(--t-shadow-drag)" },
  maxWidth: { content:"1200px", measure:"640px" },
}}};
</script>
<link rel="stylesheet" href="../_shared.css"/>
</head>

<!-- Layout: bare — the documented auth chrome (patterns.html §06): no
     SideNav, no product chrome, one centered LayoutGroup on the sheet.
     The card is the only panel on the page. Mode follows the choice
     stored by any other page (localStorage t6-theme). -->
<body class="text-ink font-sans">
<div data-dms-layout="bare" class="min-h-screen flex flex-col">

  <main class="flex-1 flex flex-col">

    <!-- ═══ LayoutGroup: auth (centered — the one intentionally centred band) ═══ -->
    <div data-dms-group="auth" class="w-full flex-1 relative flex items-center justify-center px-6 py-16">
      <div class="t6-sheet-fade"></div>

      <section data-dms-section="signin" class="relative w-full max-w-sm">
        <div class="bg-panel border border-rule rounded-lg p-8">
          <span class="w-10 h-10 rounded-md border border-rule bg-panel flex items-center justify-center text-cobalt mx-auto">
            <!-- icon: Tile -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6" aria-hidden="true"><path d="M8 2.5v19M16 2.5v19M2.5 8h19M2.5 16h19" opacity="0.45"/><rect x="9.2" y="9.2" width="5.6" height="5.6" rx="1.1" fill="currentColor" stroke="none" transform="rotate(-8 12 12)"/></svg>
          </span>
          <h1 class="t-displayMD text-center mt-4">Sign in to Tessera</h1>
          <p class="t-proseSM text-graphite text-center mt-1.5">Your sites and datasets are where you left them.</p>

          <form class="mt-7" onsubmit="return false">
            <label for="email" class="t-proseSM font-medium block mb-1.5">email</label>
            <input id="email" type="email" placeholder="you@example.com" autocomplete="email"
              class="w-full t-proseSM bg-panel border border-ruleStrong rounded-md px-3 py-2 placeholder:text-pencil"/>

            <div class="flex items-baseline justify-between mt-4 mb-1.5">
              <label for="password" class="t-proseSM font-medium">password</label>
              <a href="#" class="t-proseSM text-cobalt hover:text-cobaltDeep">forgot?</a>
            </div>
            <input id="password" type="password" autocomplete="current-password"
              class="w-full t-proseSM bg-panel border border-ruleStrong rounded-md px-3 py-2 placeholder:text-pencil"/>

            <button class="w-full t-proseSM font-medium bg-cobalt text-accentInk hover:bg-cobaltDeep rounded-md px-3.5 py-2.5 mt-6">sign in</button>
          </form>

          <div class="border-t border-rule mt-6 pt-5 text-center">
            <p class="t-proseXS text-graphite">Tessera is in beta — accounts are invite-only.</p>
            <a href="beta-landing.html#invite" class="t-proseSM text-cobalt hover:text-cobaltDeep inline-flex items-center gap-1 mt-1.5">
              request an invite
              <!-- icon: ArrowRight -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5" aria-hidden="true"><path d="M4.5 12h15M13.5 6l6 6-6 6"/></svg>
            </a>
          </div>
        </div>

        <p class="t-metaXS text-pencil text-center mt-5">
          <a href="beta-landing.html" class="hover:text-graphite">← tessera.build</a>
          <span class="px-2">·</span>beta 0.6.0
        </p>
      </section>
    </div>

  </main>

  <!-- footer link block (doc scaffolding — kept minimal on the auth page) -->
  <footer data-dms-group="footer" class="w-full border-t border-rule">
    <div class="mx-auto w-full max-w-content px-6 lg:px-8 py-5">
      <div class="flex flex-wrap items-center justify-center gap-x-5 gap-y-2">
        <span class="t-metaXS text-pencil">design system</span>
        <a href="../design-system/theme.html" class="t-metaXS text-pencil hover:text-graphite">1 theme</a>
        <a href="../design-system/layouts.html" class="t-metaXS text-pencil hover:text-graphite">2 layouts</a>
        <a href="../design-system/grid.html" class="t-metaXS text-pencil hover:text-graphite">3 grid</a>
        <a href="../design-system/components.html" class="t-metaXS text-pencil hover:text-graphite">4 components</a>
        <a href="../design-system/patterns.html" class="t-metaXS text-pencil hover:text-graphite">5 patterns</a>
        <a href="beta-landing.html" class="t-metaXS text-pencil hover:text-graphite">beta landing</a>
        <a href="features.html" class="t-metaXS text-pencil hover:text-graphite">features</a>
        <a href="docs.html" class="t-metaXS text-pencil hover:text-graphite">docs</a>
        <span class="t-metaXS text-cobalt">sign in (this page)</span>
        <a href="admin-site.html" class="t-metaXS text-pencil hover:text-graphite">admin</a>
      </div>
    </div>
  </footer>

</div>

<script src="../ds-nav.js"></script>
</body>
</html>
