<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:flex; gap: 12px; flex-wrap: wrap; align-items: center;">
    <button class="btn btn-primary">Compose page</button>
    <button class="btn btn-secondary">View source</button>
    <button class="btn btn-tertiary">Cancel</button>
    <button class="btn btn-danger">Delete row</button>
  </div>
  <div style="margin-top: 14px; display:flex; gap: 12px; flex-wrap: wrap; align-items: center;">
    <button class="btn btn-primary btn-sm">Small</button>
    <button class="btn btn-secondary btn-sm">Small</button>
    <button class="btn btn-primary btn-lg">Large</button>
    <button class="btn btn-secondary" disabled style="opacity:0.5; cursor:not-allowed;">Disabled</button>
  </div>
  <div style="margin-top: 16px; font-family: var(--font-mono); font-size:11px; color: var(--fg-subtle); letter-spacing: 0.06em; text-transform: uppercase;">
    primary · secondary · tertiary · danger
  </div>
</body></html>
