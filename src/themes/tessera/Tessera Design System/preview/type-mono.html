<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="font-family: var(--font-mono); font-size: 14px; line-height: 1.5; font-variant-numeric: tabular-nums slashed-zero;">
    <div>SELECT id, label, value FROM data_items</div>
    <div>  WHERE pattern = 'station.home'</div>
    <div>  ORDER BY ordinal ASC;</div>
  </div>
  <div style="margin-top: 20px; display:flex; gap: 24px; align-items:baseline; font-family: var(--font-mono); font-variant-numeric: tabular-nums slashed-zero;">
    <div><div style="font-size:11px;color:var(--fg-subtle);text-transform:uppercase;letter-spacing:0.06em;">listeners</div><div style="font-size:24px;color:var(--fg);">12,481</div></div>
    <div><div style="font-size:11px;color:var(--fg-subtle);text-transform:uppercase;letter-spacing:0.06em;">avg session</div><div style="font-size:24px;color:var(--fg);">38m 04s</div></div>
    <div><div style="font-size:11px;color:var(--fg-subtle);text-transform:uppercase;letter-spacing:0.06em;">peak</div><div style="font-size:24px;color:var(--fg);">02:18 EST</div></div>
  </div>
  <div style="margin-top: 18px; font-family: var(--font-sans); font-size: 12px; color: var(--fg-muted); max-width: 540px; line-height: 1.5;">
    IBM Plex Mono with tabular figures and slashed zero. Used for code,
    data, KPIs — anywhere numbers must align.
  </div>
</body></html>
