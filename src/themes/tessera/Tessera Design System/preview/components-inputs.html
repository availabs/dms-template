<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:flex; flex-direction:column; gap: 12px; max-width: 460px;">
    <div>
      <label style="display:block; font-family: var(--font-sans); font-weight:500; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-muted); margin-bottom:6px;">Site title</label>
      <input class="input" type="text" value="WCDB-FM" />
    </div>
    <div>
      <label style="display:block; font-family: var(--font-sans); font-weight:500; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-muted); margin-bottom:6px;">Pattern</label>
      <select class="input">
        <option>station.home</option>
        <option>station.show</option>
        <option>station.playlist</option>
      </select>
    </div>
    <div>
      <label style="display:block; font-family: var(--font-sans); font-weight:500; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-muted); margin-bottom:6px;">Description</label>
      <textarea class="input" rows="2">Albany student radio, broadcasting since 1978.</textarea>
    </div>
  </div>
</body></html>
