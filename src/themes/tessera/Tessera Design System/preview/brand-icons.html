<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <div style="display:flex; gap: 22px; align-items: center; flex-wrap: wrap; color: #2A2F36;">
    <i data-lucide="layout-grid" style="width:24px; height:24px; stroke-width:1.5;"></i>
    <i data-lucide="table" style="width:24px; height:24px; stroke-width:1.5;"></i>
    <i data-lucide="map" style="width:24px; height:24px; stroke-width:1.5;"></i>
    <i data-lucide="bar-chart-3" style="width:24px; height:24px; stroke-width:1.5;"></i>
    <i data-lucide="line-chart" style="width:24px; height:24px; stroke-width:1.5;"></i>
    <i data-lucide="database" style="width:24px; height:24px; stroke-width:1.5;"></i>
    <i data-lucide="archive" style="width:24px; height:24px; stroke-width:1.5;"></i>
    <i data-lucide="square" style="width:24px; height:24px; stroke-width:1.5;"></i>
    <i data-lucide="settings" style="width:24px; height:24px; stroke-width:1.5;"></i>
    <i data-lucide="search" style="width:24px; height:24px; stroke-width:1.5;"></i>
    <i data-lucide="filter" style="width:24px; height:24px; stroke-width:1.5;"></i>
    <i data-lucide="link-2" style="width:24px; height:24px; stroke-width:1.5;"></i>
    <i data-lucide="chevron-right" style="width:24px; height:24px; stroke-width:1.5;"></i>
    <i data-lucide="external-link" style="width:24px; height:24px; stroke-width:1.5;"></i>
    <i data-lucide="terminal" style="width:24px; height:24px; stroke-width:1.5;"></i>
    <i data-lucide="file-text" style="width:24px; height:24px; stroke-width:1.5;"></i>
  </div>
  <div style="margin-top: 22px; font-family: var(--font-sans); font-size:13px; color: var(--fg-muted); max-width: 540px; line-height: 1.5;">
    Lucide, 24px grid, 1.5px stroke. Substituted for Phosphor regular per brief — swap when a custom set is drawn.
  </div>
  <script>lucide.createIcons();</script>
</body></html>
