<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:grid; grid-template-columns: repeat(12, 1fr); gap: 24px;">
    <div style="grid-column: span 12; height: 14px; background: #E8E2D5; border:1px solid #D9D2C2;"></div>
    <div style="grid-column: span 8; height: 14px; background: #E8E2D5; border:1px solid #D9D2C2;"></div>
    <div style="grid-column: span 4; height: 14px; background: #E8E2D5; border:1px solid #D9D2C2;"></div>
    <div style="grid-column: span 6; height: 14px; background: #E8E2D5; border:1px solid #D9D2C2;"></div>
    <div style="grid-column: span 6; height: 14px; background: #E8E2D5; border:1px solid #D9D2C2;"></div>
    <div style="grid-column: span 4; height: 14px; background: #E8E2D5; border:1px solid #D9D2C2;"></div>
    <div style="grid-column: span 4; height: 14px; background: #E8E2D5; border:1px solid #D9D2C2;"></div>
    <div style="grid-column: span 4; height: 14px; background: #E8E2D5; border:1px solid #D9D2C2;"></div>
  </div>
  <div style="margin-top:18px; font-family: var(--font-mono); font-size:11px; color: var(--fg-muted); letter-spacing: 0.06em; text-transform: uppercase;">
    12 columns · 24px gutter · 1280px max · 4 columns mobile
  </div>
</body></html>
