<!DOCTYPE html>
<html><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:flex; gap:0; height:80px; border:1px solid var(--rule); margin-bottom: 12px;">
    <div style="flex:1; background:#B5532C;"></div>

    <div style="flex:1; background:#2A2F36;"></div>
