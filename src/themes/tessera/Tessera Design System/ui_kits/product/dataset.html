// === Wordmark.jsx ===
// Wordmark.jsx — inline-SVG version of the Tessera wordmark.
// Uses currentColor so it inherits color from its parent.

function Wordmark({ size = 28, accent = "#B5532C", color = "currentColor" }) {
  // viewBox 460 96 — 4.79:1 ratio
  const w = size * 4.79;
  return (
    <svg
      viewBox="0 0 460 96"
      width={w}
      height={size}
      fill="none"
      aria-label="Tessera"
      role="img"
    >
      <rect x="20" y="32" width="32" height="32" fill={accent} />
      <text
        x="68"
        y="64"
        fontFamily='"Newsreader", "Tiempos Headline", Georgia, serif'
        fontWeight="500"
        fontSize="56"
        letterSpacing="-0.012em"
        fill={color}
      >
        Tessera
      </text>
    </svg>
  );
}

function Monogram({ size = 24, color = "currentColor", accent }) {
  return (
    <svg viewBox="0 0 96 96" width={size} height={size} fill="none" aria-hidden="true">
      <rect x="14" y="14" width="18" height="18" fill={color} />
      <rect x="34" y="14" width="18" height="18" fill={accent || color} />
      <rect x="54" y="14" width="18" height="18" fill={color} />
      <rect x="34" y="34" width="18" height="18" fill={color} />
      <rect x="34" y="54" width="18" height="18" fill={color} />
    </svg>
  );
}

Object.assign(window, { Wordmark, Monogram });


// === ProductChrome.jsx ===

          </button>

          </button>
          <div style={pcStyles.who}>
            <div style={pcStyles.avatar}>MT</div>

        </div>

      <div style={pcStyles.main}>{children}</div>

}

// === PatternsList.jsx ===
// PatternsList.jsx — list of section "patterns" composed in a site.
// Each pattern is a typed row; clicking opens the editor.

function PatternsList({ patterns, onOpen }) {

    <div style={plStyles.wrap}>

            <th className="num">Rows</th>
            <th className="num">Last placed</th>

          </tr>
        </thead>
        <tbody>
          {patterns.map((p, i) => (
            <tr key={p.id} onClick={() => onOpen && onOpen(p)} style={{ cursor: "pointer" }}>
              <td><span style={plStyles.ord}>{String(i + 1).padStart(2, "0")}</span></td>
              <td>
                <div style={plStyles.title}>{p.title}</div>
                <div style={plStyles.slug}>{p.slug}</div>

              </td>
              <td><span className="mono" style={{ fontSize: 12, color: "var(--fg-muted)" }}>{p.dataset || "—"}</span></td>
              <td className="num">{p.rows != null ? p.rows.toLocaleString("en-US") : "—"}</td>
              <td className="num"><span style={{ color: "var(--fg-muted)" }}>{p.placed}</span></td>
              <td>
                <i data-lucide="chevron-right" style={{ width: 14, height: 14, color: "var(--fg-subtle)" }}></i>

// === Toolbar.jsx ===
// Toolbar.jsx — secondary bar under the page header. Filter, sort, view toggle.

function Toolbar({ tabs = [], active, onTab, search, onSearch, right }) {
  return (
    <div style={tbStyles.bar}>
      <div style={tbStyles.left}>
        {tabs.length > 0 && (
          <div style={tbStyles.tabs} role="tablist">
            {tabs.map(t => (
              <button
                key={t.id}
                role="tab"
                aria-selected={t.id === active}
                onClick={() => onTab && onTab(t.id)}
                style={{
                  ...tbStyles.tab,
                  color: t.id === active ? "var(--fg)" : "var(--fg-muted)",
                  borderBottom: t.id === active ? "1px solid var(--fg)" : "1px solid transparent",
                }}
              >
                {t.label}
                {t.count != null && <span style={tbStyles.tabCount}>{t.count}</span>}
              </button>
            ))}
          </div>
        )}
      </div>
      <div style={tbStyles.right}>
        {onSearch && (
          <div style={tbStyles.search}>
            <i data-lucide="search" style={{ width: 12, height: 12, color: "var(--fg-subtle)" }}></i>
            <input value={search} onChange={(e) => onSearch(e.target.value)} placeholder="Search patterns" style={tbStyles.input} />
          </div>
        )}
        {right}
      </div>
    </div>
  );
}

  ["sho_014", "Static Hour",      "DJ Calliope", "Wed", "16:00", 1020, "live"],
];

const COLS = ["ID", "Title", "DJ", "Day", "Slot", "Listeners", "State"];

function DatasetPage() {
  const [stateFilter, setStateFilter] = React.useState("all");
  const filtered = ROWS.filter(r => stateFilter === "all" || r[6] === stateFilter);

  return (
    <ProductChrome site="wcdb.fm" section="Dataset · shows">
      <SiteSidebar active="datasets" />

      <section style={{ flex: 1, overflow: "hidden", display: "flex", flexDirection: "column", minWidth: 0 }}>
        {/* Header */}
        <div style={{ padding: "28px 32px 20px", borderBottom: "1px solid var(--rule)" }}>
          <div className="designator-mono">Dataset · 84 rows · pg:public</div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginTop: 8 }}>
            <div>
              <h1 style={{ fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 36, letterSpacing: "-0.012em", margin: 0 }}>
                shows
              </h1>
              <div style={{ fontFamily: "var(--font-sans)", fontSize: 13, color: "var(--fg-muted)", marginTop: 6, maxWidth: 620 }}>
                Programmed shows that air on wcdb.fm. Drives both the schedule pattern and the show archive table.
              </div>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button className="btn btn-tertiary btn-sm">Export</button>
              <button className="btn btn-secondary btn-sm" style={{ borderRadius: 2 }}>
                <i data-lucide="filter" style={{ width: 12, height: 12 }}></i> Filter
              </button>
              <button className="btn btn-primary btn-sm" style={{ borderRadius: 2 }}>Add row</button>
            </div>
          </div>
        </div>

        {/* Filter chrome */}
        <div style={{ display: "flex", alignItems: "center", padding: "10px 32px", borderBottom: "1px solid var(--rule)", background: "var(--bg)", gap: 16, fontFamily: "var(--font-sans)", fontSize: 12 }}>
          <FilterChip label="state" active={stateFilter !== "all"}>
            <select value={stateFilter} onChange={(e) => setStateFilter(e.target.value)} style={fcSelect}>
              <option value="all">all</option>
              <option value="live">live</option>
              <option value="draft">draft</option>
              <option value="encore">encore</option>
            </select>
          </FilterChip>
          <FilterChip label="day"><span style={{ color: "var(--fg-subtle)" }}>any</span></FilterChip>
          <FilterChip label="dj"><span style={{ color: "var(--fg-subtle)" }}>any</span></FilterChip>
          <div style={{ flex: 1 }} />
          <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--fg-muted)", letterSpacing: "0.04em" }}>
            {filtered.length}/{ROWS.length} rows · sort: day asc, slot asc
          </div>
        </div>

        {/* Table */}
        <div style={{ flex: 1, overflow: "auto", background: "var(--bg-raised)" }}>
          <table className="tessera" style={{ width: "100%" }}>
            <thead style={{ position: "sticky", top: 0, background: "var(--color-parchment)", zIndex: 1 }}>
              <tr>
                <th style={{ width: 34 }}><input type="checkbox" /></th>
                {COLS.map(c => (
                  <th key={c} className={c === "Listeners" ? "num" : ""}>
                    <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                      {c}
                      {(c === "Day" || c === "Slot") && <i data-lucide="arrow-up" style={{ width: 10, height: 10 }}></i>}
                    </span>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map((r, i) => (
                <tr key={r[0]}>
                  <td><input type="checkbox" /></td>
                  <td><span className="mono" style={{ fontSize: 12, color: "var(--fg-muted)" }}>{r[0]}</span></td>
                  <td>{r[1]}</td>
                  <td>{r[2] === "—" ? <span style={{ color: "var(--fg-subtle)" }}>—</span> : r[2]}</td>
                  <td><span className="mono" style={{ fontSize: 12 }}>{r[3]}</span></td>
                  <td><span className="mono" style={{ fontSize: 12 }}>{r[4]}</span></td>
                  <td className="num">{r[5].toLocaleString("en-US")}</td>
                  <td>
                    {r[6] === "live" && <span className="badge badge-accent">Live</span>}
                    {r[6] === "draft" && <span className="badge">Draft</span>}
                    {r[6] === "encore" && <span className="badge badge-cool">Encore</span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* Pager */}
        <div style={{ borderTop: "1px solid var(--rule)", padding: "10px 32px", background: "var(--bg)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--fg-muted)" }}>
            page 1 of 6 · 14 of 84 rows
          </div>
          <div style={{ display: "flex", gap: 4, fontFamily: "var(--font-mono)", fontSize: 12 }}>
            <button className="btn btn-tertiary btn-sm">←</button>
            <div style={{ padding: "4px 10px", color: "var(--fg)", borderBottom: "1px solid var(--fg)" }}>01</div>
            <div style={{ padding: "4px 10px", color: "var(--fg-muted)" }}>02</div>
            <div style={{ padding: "4px 10px", color: "var(--fg-muted)" }}>03</div>
            <div style={{ padding: "4px 10px", color: "var(--fg-subtle)" }}>…</div>
            <div style={{ padding: "4px 10px", color: "var(--fg-muted)" }}>06</div>
            <button className="btn btn-tertiary btn-sm">→</button>
          </div>
        </div>
      </section>
    </ProductChrome>
  );
}

function FilterChip({ label, children, active }) {
  return (
    <div style={{
      display: "inline-flex",
      alignItems: "center",
      gap: 8,
      border: "1px solid var(--rule)",
      background: "var(--bg-raised)",
      borderRadius: 2,
      padding: "4px 10px",
      fontFamily: "var(--font-mono)",
      fontSize: 11,
    }}>
      <span style={{ color: "var(--fg-muted)", textTransform: "uppercase", letterSpacing: "0.06em" }}>{label}</span>
      <span style={{ color: "var(--fg-subtle)" }}>=</span>
      <span style={{ color: active ? "var(--color-oxide)" : "var(--fg)" }}>{children}</span>
    </div>
  );
}

const fcSelect = {
  border: 0,
  background: "transparent",
  fontFamily: "var(--font-mono)",
  fontSize: 11,
  color: "inherit",
  outline: "none",
  padding: 0,
};

const root = ReactDOM.createRoot(document.getElementById("app"));
root.render(<DatasetPage />);

setTimeout(() => window.lucide && window.lucide.createIcons(), 200);
const obs = new MutationObserver(() => window.lucide && window.lucide.createIcons());
obs.observe(document.body, { childList: true, subtree: true });
</script>
</body>
</html>
