<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Ticket · Site Management · TransportNY</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="_shared.css"/>
  <style>.font-display{font-family:Oswald,sans-serif}.font-proxima{font-family:'Source Sans 3',system-ui,sans-serif}.font-mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}</style>
</head>
<body class="tny-pane font-proxima text-[#0F1722]">
<!--
  sitemgmt-ticket.html · SITE MANAGEMENT — single ticket detail (BugHerd/Jira-style).
  Reads ?id=<n> (default: first Blocker, else first ticket). Header block →
  two-column body (left = description/steps/expected/actual + pinned screenshot +
  env chips; right rail = field definition list) → comments thread.
  Everything dynamic is rendered from window.SITEMGMT (sitemgmt-data.js).
-->
<div class="bg-[#ECEEF2]" data-dms-layout="app">
  <div class="relative isolate flex min-h-svh w-full max-lg:flex-col">
    <div class="flex-1 flex flex-col items-stretch max-w-full min-h-screen lg:ml-60">

      <!-- ════════ SIDENAV ════════ -->
      <aside class="fixed inset-y-0 left-0 w-60 max-lg:hidden z-30">
        <div class="flex flex-col w-60 h-full bg-[#12181F] border-r border-[#2a3545]">
          <a href="sitemgmt-overview.html" class="relative h-16 bg-[#0A0E13] border-b border-[#2a3545] flex items-center px-3">
            <div class="w-10 h-10 flex items-center justify-center flex-shrink-0 bg-[#1F3F8F] rounded text-white font-display font-bold text-[14px]">SM</div>
            <div class="flex-1 ml-3 min-w-0"><span class="font-display uppercase text-white text-[15px] tracking-wide truncate">Site Mgmt</span><div class="font-mono text-slate-400 text-[9px] uppercase tracking-[0.18em]">NYSDOT · TransportNY</div></div>
          </a>
          <div class="flex-1 py-1 overflow-y-auto">
            <div class="px-4 pt-4 pb-1 font-mono text-[10px] font-semibold text-slate-500 uppercase tracking-[0.2em]">Manage</div>
            <a href="sitemgmt-overview.html" class="font-proxima text-[13.5px] flex items-center px-4 py-2.5 hover:bg-[#1e2530] text-slate-300 border-l-[3px] border-transparent"><svg class="size-[18px] mr-3 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10h14V10"/></svg><span class="flex-1">Control Room</span></a>
            <a href="sitemgmt-tickets.html" class="font-proxima text-[13.5px] flex items-center px-4 py-2.5 bg-[#1e2530] text-white border-l-[3px] border-[#FACC15]"><svg class="size-[18px] mr-3 text-[#FACC15]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4V8Z"/><path d="M13 6v12"/></svg><span class="flex-1">Tickets</span></a>
            <div class="px-4 pt-4 pb-1 font-mono text-[10px] font-semibold text-slate-500 uppercase tracking-[0.2em]">Surfaces</div>
            <a href="tsmo-home.html" class="font-proxima text-[12.5px] flex items-center px-4 py-2 hover:bg-[#1e2530] text-slate-400 border-l-[3px] border-transparent"><span class="flex-1">TSMO (tsmo2)</span></a>
            <a href="freight-atlas-home.html" class="font-proxima text-[12.5px] flex items-center px-4 py-2 hover:bg-[#1e2530] text-slate-400 border-l-[3px] border-transparent"><span class="flex-1">Freight Atlas</span></a>
            <a href="map-21.html" class="font-proxima text-[12.5px] flex items-center px-4 py-2 hover:bg-[#1e2530] text-slate-400 border-l-[3px] border-transparent"><span class="flex-1">NPMRDS</span></a>
          </div>
          <div class="border-t border-[#2a3545] py-2 px-4 flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-[#37576B] to-[#1f3450] flex items-center justify-center text-white"><svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></div>
            <div class="flex-1 min-w-0"><div class="font-display uppercase text-white text-[12px] tracking-wide truncate">Delivery team</div><div class="font-mono text-slate-400 text-[10px] uppercase tracking-[0.18em] truncate">internal · QA</div></div>
          </div>
        </div>
      </aside>

      <div class="flex flex-1 items-start">
        <div class="flex-1 flex flex-col h-full bg-[#ECEEF2] min-w-0">

          <!-- ═════════ BREADCRUMB BAR ═════════ -->
          <div class="w-full bg-white border-b border-zinc-950/10">
            <div class="mr-auto w-full max-w-[1480px] pl-12 pr-8">
              <nav class="h-11 flex items-center font-mono text-[10.5px] uppercase tracking-[0.18em]" aria-label="Breadcrumb">
                <a href="sitemgmt-overview.html" class="inline-flex items-center gap-1.5 text-slate-500 hover:text-[#0f1722]"><svg class="size-4 text-[#37576B] relative -top-[1px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10h14V10"/></svg>Site Management</a>
                <span class="text-slate-300 px-2">/</span>
                <a href="sitemgmt-tickets.html" class="text-slate-500 hover:text-[#0f1722]">Tickets</a>
                <span class="text-slate-300 px-2">/</span>
                <span id="crumb" class="text-[#0f1722]"></span>
              </nav>
            </div>
          </div>

          <!-- ═════════ HEADER BAND (filled by JS) ═════════ -->
          <div class="w-full bg-white border-b border-zinc-950/10">
            <div class="mr-auto w-full max-w-[1480px] pl-12 pr-8 py-5"><div id="hdr"></div></div>
          </div>

          <!-- ═════════ CONTENT BAND (filled by JS) ═════════ -->
          <div class="w-full bg-[#ECEEF2] pt-6 pb-12">
            <div class="mr-auto w-full max-w-[1480px] pl-12 pr-8"><div id="ticket"></div></div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="sitemgmt-data.js"></script>
<script>
(function(){
  var S = window.SITEMGMT;
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function badge(text, cls){ return '<span class="inline-flex items-center rounded px-2 py-[3px] text-[11px] font-medium '+cls+'">'+esc(text)+'</span>'; }
  function pill(text, cls){ return '<span class="inline-flex items-center rounded-full px-2.5 py-[3px] text-[11px] font-medium '+cls+'">'+esc(text)+'</span>'; }
  function chip(text){ return '<span class="inline-flex items-center rounded font-mono text-[11px] px-2 py-1 bg-slate-100 text-slate-600">'+esc(text)+'</span>'; }
  function lbl(text){ return '<div class="font-mono text-[10px] uppercase tracking-[0.18em] text-slate-400 mb-1">'+esc(text)+'</div>'; }
  function statusBadge(st){
    var cls = (st==='Resolved' || st==='Closed') ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-600';
    return badge(st, cls);
  }

  // --- selection ---
  var qid = new URLSearchParams(location.search).get('id');
  var t = qid ? S.ticket(qid) : null;
  if(!t){ t = S.tickets.find(function(x){ return x.severity==='Blocker'; }) || S.tickets[0]; }
  var p = S.page(t.page);
  var surfLabel = p ? S.surface(p.surface).label : '';
  var src = S.sourceOf(t);

  // --- header block ---
  var header =
    '<div>'
    + '<div class="font-mono text-[10.5px] uppercase tracking-[0.22em] text-slate-400 mb-2">// ticket</div>'
    + '<div class="flex items-center flex-wrap gap-2 mb-2">'
    +   '<span class="font-mono text-[12px] text-slate-400">#'+esc(t.id)+'</span>'
    +   badge(t.severity, S.sevColor[t.severity])
    +   pill(t.priority, S.prioColor[t.priority])
    +   statusBadge(t.status)
    +   badge(S.sourceLabel[src]+' found', S.sourceColor[src])
    + '</div>'
    + '<h1 class="font-display text-[26px] font-medium text-slate-900 leading-tight">'+esc(t.title)+'</h1>'
    + (p ? '<div class="mt-1.5 font-proxima text-[13px] text-slate-500">target · '
        + '<a href="sitemgmt-page.html?id='+encodeURIComponent(p.id)+'" class="text-blue-600 hover:text-blue-800 font-medium">'+esc(surfLabel)+' / '+esc(p.name)+'</a>'
        + ' <span class="font-mono text-[11px] text-slate-400">'+esc(p.route)+'</span>'
        + ' · page is <span class="inline-flex items-center rounded px-1.5 py-[1px] text-[10px] font-medium '+S.stageColor[S.stageOf(p)]+'">'+esc(S.stageOf(p))+'</span></div>' : '')
    + '<div class="mt-3 flex gap-2">'
    +   (S.isOpen(t)
          ? '<button class="font-proxima text-[13px] px-4 py-1.5 rounded-md bg-emerald-600 text-white hover:bg-emerald-700">Mark resolved</button>'
          : '<button class="font-proxima text-[13px] px-4 py-1.5 rounded-md border border-slate-300 text-slate-600 hover:bg-slate-50">Reopen</button>')
    +   '<a href="sitemgmt-tickets.html" class="font-proxima text-[13px] px-4 py-1.5 rounded-md border border-slate-200 text-slate-600 hover:bg-slate-50">All tickets</a>'
    + '</div>'
    + '</div>';

  // --- left card sections ---
  function section(label, body){
    return '<div class="mb-4">'+lbl(label)+'<div class="font-proxima text-[14px] text-slate-700 leading-relaxed whitespace-pre-line">'+esc(body)+'</div></div>';
  }
  var env = t.env || {};
  var left =
    '<div class="bg-white rounded-lg shadow-sm border border-zinc-950/5 p-5">'
    + section('description', t.desc)
    + section('steps to reproduce', t.steps)
    + section('expected', t.expected)
    + section('actual', t.actual)
    // screenshot placeholder w/ BugHerd-style pin
    + '<div class="mb-4">'+lbl('screenshot')
    +   '<div class="aspect-[16/9] rounded-md bg-slate-100 border border-slate-200 relative">'
    +     '<div class="absolute inset-0 flex items-center justify-center font-mono text-[12px] uppercase tracking-[0.2em] text-slate-400">page screenshot</div>'
    +     '<span class="absolute" style="left:38%;top:44%"><span class="block size-5 rounded-full bg-rose-500 ring-4 ring-rose-500/30"></span></span>'
    +   '</div>'
    + '</div>'
    // environment chips
    + '<div>'+lbl('environment')
    +   '<div class="flex flex-wrap gap-2">'+chip(env.route||'—')+chip(env.browser||'—')+chip(env.viewport||'—')+'</div>'
    + '</div>'
    + '</div>';

  // --- right rail ---
  function field(label, valueHtml){
    return '<div class="py-2 border-b border-slate-50 last:border-0">'+lbl(label)
      + '<div class="font-proxima text-[13.5px] text-slate-700">'+valueHtml+'</div></div>';
  }
  var labelsHtml = (t.labels && t.labels.length)
    ? '<div class="flex flex-wrap gap-1.5">'+t.labels.map(function(l){
        return '<span class="inline-flex items-center rounded font-mono text-[10px] px-1.5 py-0.5 bg-slate-100 text-slate-500">'+esc(l)+'</span>'; }).join('')+'</div>'
    : '<span class="font-mono text-[11px] text-slate-300">—</span>';
  var targetHtml = p
    ? '<a href="sitemgmt-page.html?id='+encodeURIComponent(p.id)+'" class="text-blue-600 hover:text-blue-800">'+esc(p.name)+'</a>'
    : '<span class="text-slate-400">—</span>';

  var rail =
    '<div class="lg:sticky lg:top-6">'
    + '<div class="bg-white rounded-lg shadow-sm border border-zinc-950/5 p-5">'
    +   '<div class="font-display text-[14px] font-medium text-slate-800 border-b border-slate-100 pb-2 mb-1">Details</div>'
    +   field('status', statusBadge(t.status))
    +   field('source', badge(S.sourceLabel[src], S.sourceColor[src]))
    +   field('assignee', esc(t.assignee))
    +   field('reporter', esc(t.reporter))
    +   field('severity', badge(t.severity, S.sevColor[t.severity]))
    +   field('priority', pill(t.priority, S.prioColor[t.priority]))
    +   field('target page', targetHtml)
    +   field('opened', '<span class="font-mono text-[12px] tabular-nums text-slate-600">'+esc(t.opened)+'</span>')
    +   field('updated', '<span class="font-mono text-[12px] tabular-nums text-slate-600">'+esc(t.updated)+'</span>')
    +   field('labels', labelsHtml)
    + '</div>'
    + '</div>';

  // --- comments ---
  var comments = (t.comments||[]).map(function(c){
    var init = esc((c.who||'?').slice(0,1).toUpperCase());
    return '<div class="flex items-start gap-3 py-3 border-b border-slate-50 last:border-0">'
      + '<span class="flex-shrink-0 size-7 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center font-display text-[12px] font-medium">'+init+'</span>'
      + '<div class="flex-1 min-w-0">'
      +   '<div class="flex items-center gap-2 mb-0.5"><span class="font-mono text-[11px] font-semibold text-slate-600">'+esc(c.who)+'</span>'
      +     '<span class="font-mono text-[10px] text-slate-400 tabular-nums">'+esc(c.when)+'</span></div>'
      +   '<div class="font-proxima text-[13.5px] text-slate-700 leading-relaxed">'+esc(c.text)+'</div>'
      + '</div></div>';
  }).join('');
  if(!comments){ comments = '<div class="py-3 font-proxima text-[13px] text-slate-400">No comments yet.</div>'; }

  var commentsCard =
    '<div class="mt-5 bg-white rounded-lg shadow-sm border border-zinc-950/5 p-5">'
    + '<div class="font-display text-[14px] font-medium text-slate-800 border-b border-slate-100 pb-2 mb-1">Comments <span class="font-mono text-[11px] text-slate-400">('+(t.comments?t.comments.length:0)+')</span></div>'
    + '<div class="divide-y-0">'+comments+'</div>'
    + '<div class="mt-4 pt-4 border-t border-slate-100">'
    +   '<textarea disabled placeholder="Add a comment…" class="w-full h-20 rounded-md border border-slate-200 bg-slate-50 px-3 py-2 font-proxima text-[13px] text-slate-400 resize-none cursor-not-allowed"></textarea>'
    +   '<div class="mt-2 flex justify-end"><button disabled class="font-proxima text-[13px] px-4 py-1.5 rounded-md bg-slate-200 text-slate-400 cursor-not-allowed">Comment</button></div>'
    + '</div>'
    + '</div>';

  // --- assemble ---
  document.getElementById('crumb').textContent = '#'+t.id;
  document.getElementById('hdr').innerHTML = header;
  document.getElementById('ticket').innerHTML =
    '<div class="grid grid-cols-1 lg:grid-cols-[1fr_300px] gap-5">'
    +   '<div>'+left+'</div>'
    +   rail
    + '</div>'
    + commentsCard;
})();
</script>
<script src="../ds-nav.js"></script>
</body>
</html>
