<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Tickets · Site Management · TransportNY</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="_shared.css"/>
  <style>.font-display{font-family:Oswald,sans-serif}.font-proxima{font-family:'Source Sans 3',system-ui,sans-serif}.font-mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}</style>
</head>
<body class="tny-pane font-proxima text-[#0F1722]">
<!--
  sitemgmt-tickets.html · SITE MANAGEMENT — all QA tickets across the surfaces. Severity, source
  (AI / dev / client), status; filter by open/closed/severity/source; each row → ticket detail.
  Rendered from window.SITEMGMT.
-->
<div class="bg-[#ECEEF2]" data-dms-layout="app">
  <div class="relative isolate flex min-h-svh w-full max-lg:flex-col">
    <div class="flex-1 flex flex-col items-stretch max-w-full min-h-screen lg:ml-60">

      <!-- ════════ SIDENAV ════════ -->
      <aside class="fixed inset-y-0 left-0 w-60 max-lg:hidden z-30">
        <div class="flex flex-col w-60 h-full bg-[#12181F] border-r border-[#2a3545]">
          <a href="sitemgmt-overview.html" class="relative h-16 bg-[#0A0E13] border-b border-[#2a3545] flex items-center px-3">
            <div class="w-10 h-10 flex items-center justify-center flex-shrink-0 bg-[#1F3F8F] rounded text-white font-display font-bold text-[14px]">SM</div>
            <div class="flex-1 ml-3 min-w-0"><span class="font-display uppercase text-white text-[15px] tracking-wide truncate">Site Mgmt</span><div class="font-mono text-slate-400 text-[9px] uppercase tracking-[0.18em]">NYSDOT · TransportNY</div></div>
          </a>
          <div class="flex-1 py-1 overflow-y-auto">
            <div class="px-4 pt-4 pb-1 font-mono text-[10px] font-semibold text-slate-500 uppercase tracking-[0.2em]">Manage</div>
            <a href="sitemgmt-overview.html" class="font-proxima text-[13.5px] flex items-center px-4 py-2.5 hover:bg-[#1e2530] text-slate-300 border-l-[3px] border-transparent"><svg class="size-[18px] mr-3 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10h14V10"/></svg><span class="flex-1">Control Room</span></a>
            <a href="sitemgmt-tickets.html" class="font-proxima text-[13.5px] flex items-center px-4 py-2.5 bg-[#1e2530] text-white border-l-[3px] border-[#FACC15]"><svg class="size-[18px] mr-3 text-[#FACC15]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4V8Z"/><path d="M13 6v12"/></svg><span class="flex-1">Tickets</span></a>
            <div class="px-4 pt-4 pb-1 font-mono text-[10px] font-semibold text-slate-500 uppercase tracking-[0.2em]">Surfaces</div>
            <a href="tsmo-home.html" class="font-proxima text-[12.5px] flex items-center px-4 py-2 hover:bg-[#1e2530] text-slate-400 border-l-[3px] border-transparent"><span class="flex-1">TSMO (tsmo2)</span></a>
            <a href="freight-atlas-home.html" class="font-proxima text-[12.5px] flex items-center px-4 py-2 hover:bg-[#1e2530] text-slate-400 border-l-[3px] border-transparent"><span class="flex-1">Freight Atlas</span></a>
            <a href="map-21.html" class="font-proxima text-[12.5px] flex items-center px-4 py-2 hover:bg-[#1e2530] text-slate-400 border-l-[3px] border-transparent"><span class="flex-1">NPMRDS</span></a>
          </div>
          <div class="border-t border-[#2a3545] py-2 px-4 flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-[#37576B] to-[#1f3450] flex items-center justify-center text-white"><svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></div>
            <div class="flex-1 min-w-0"><div class="font-display uppercase text-white text-[12px] tracking-wide truncate">Delivery team</div><div class="font-mono text-slate-400 text-[10px] uppercase tracking-[0.18em] truncate">internal · QA</div></div>
          </div>
        </div>
      </aside>

      <div class="flex flex-1 items-start">
        <div class="flex-1 flex flex-col h-full bg-[#ECEEF2] min-w-0">

          <!-- ═════════ BREADCRUMB BAR ═════════ -->
          <div class="w-full bg-white border-b border-zinc-950/10">
            <div class="mr-auto w-full max-w-[1480px] pl-12 pr-8">
              <nav class="h-11 flex items-center font-mono text-[10.5px] uppercase tracking-[0.18em]" aria-label="Breadcrumb">
                <a href="sitemgmt-overview.html" class="inline-flex items-center gap-1.5 text-slate-500 hover:text-[#0f1722]"><svg class="size-4 text-[#37576B] relative -top-[1px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10h14V10"/></svg>Site Management</a>
                <span class="text-slate-300 px-2">/</span>
                <span class="text-[#0f1722]">Tickets</span>
              </nav>
            </div>
          </div>

          <!-- ═════════ HEADER BAND ═════════ -->
          <div class="w-full bg-white border-b border-zinc-950/10">
            <div class="mr-auto w-full max-w-[1480px] pl-12 pr-8 py-5 flex items-end justify-between gap-6">
              <div class="min-w-0">
                <div class="font-mono text-[10.5px] uppercase tracking-[0.22em] text-slate-400 mb-1.5">// site management</div>
                <h1 class="font-display font-semibold text-[28px] leading-none tracking-tight uppercase text-[#0F1722]">Tickets<span class="text-[#CA8A04]">.</span></h1>
              </div>
              <button class="tny-press inline-flex items-center gap-1.5 h-9 px-3.5 flex-shrink-0 bg-[#1F3F8F] hover:bg-[#16307A] border-b-4 border-[#0F2D4D] text-white font-display uppercase text-[12px] tracking-wide rounded-[6px]"><svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5v14M5 12h14"/></svg>Add ticket</button>
            </div>
          </div>

          <!-- ═════════ CONTENT BAND ═════════ -->
          <div class="w-full bg-[#ECEEF2] pt-6 pb-12">
            <div class="mr-auto w-full max-w-[1480px] pl-12 pr-8">
              <div id="summary"></div>
              <div id="flowcharts" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4"></div>
              <div id="filters" class="flex flex-wrap items-center gap-2 mb-3"></div>
              <div class="bg-white rounded-lg shadow-sm border border-zinc-950/5 overflow-hidden">
                <table class="w-full text-left border-collapse">
                  <thead><tr class="bg-slate-50 border-b border-slate-100 font-mono text-[10px] uppercase tracking-wider text-slate-500">
                    <th class="py-2 pl-4 pr-2 font-medium">#</th><th class="py-2 px-2 font-medium">Severity</th><th class="py-2 px-2 font-medium">Source</th>
                    <th class="py-2 px-2 font-medium">Status</th><th class="py-2 px-2 font-medium">Ticket</th><th class="py-2 px-2 font-medium">Page</th>
                    <th class="py-2 px-2 font-medium">Owner</th><th class="py-2 px-2 pr-4 font-medium">Updated</th></tr></thead>
                  <tbody id="rows"></tbody>
                </table>
              </div>
              <div id="empty" class="hidden py-8 text-center font-proxima text-[13px] text-slate-400">No tickets match this filter.</div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="sitemgmt-data.js"></script>
<script>
(function(){
  var S = window.SITEMGMT;
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function badge(text, cls){ return '<span class="inline-flex items-center rounded px-2 py-[3px] text-[11px] font-medium '+cls+'">'+esc(text)+'</span>'; }
  var statusColor = { 'Triage':'bg-slate-100 text-slate-500', 'In progress':'bg-sky-100 text-sky-700', 'In review':'bg-amber-100 text-amber-700', 'Resolved':'bg-emerald-100 text-emerald-700', 'Closed':'bg-emerald-100 text-emerald-700' };

  var filter = { kind: 'all', sev: null, src: null, site: null };
  // site (surface) — tickets carry it via their page's surface (live: the `surface` field,
  // denormalized from page_key). Label + presence come from the shared surfaces list.
  var SITELABEL = {}; (S.surfaces||[]).forEach(function(s){ SITELABEL[s.key]=s.label; });
  function siteOf(t){ return (S.page(t.page)||{}).surface || null; }
  var sites = (S.surfaces||[]).filter(function(s){ return S.tickets.some(function(t){ return siteOf(t)===s.key; }); }).map(function(s){ return [s.key, s.label]; });
  var openN = S.tickets.filter(function(t){ return S.isOpen(t); }).length;
  var chips = [
    { id:'all',    label:'All ('+S.tickets.length+')' },
    { id:'open',   label:'Open ('+openN+')' },
    { id:'closed', label:'Closed ('+(S.tickets.length-openN)+')' },
  ];
  var sevs = ['Blocker','Major','Minor','Polish'];
  var srcs = [['ai','AI'],['dev','Dev'],['client','Client']];

  function renderFilters(){
    var h = '<span class="font-mono text-[10px] uppercase tracking-wider text-slate-400 mr-1">status</span>';
    h += chips.map(function(c){ var on = filter.kind===c.id; return '<button data-k="'+c.id+'" class="chip font-proxima text-[12px] px-2.5 py-1 rounded-full border '+(on?'bg-[#1F3F8F] text-white border-[#1F3F8F]':'bg-white text-slate-600 border-slate-200 hover:border-slate-300')+'">'+c.label+'</button>'; }).join('');
    h += '<span class="font-mono text-[10px] uppercase tracking-wider text-slate-400 mx-1 ml-3">severity</span>';
    h += sevs.map(function(s){ var on=filter.sev===s; return '<button data-sev="'+s+'" class="chip font-proxima text-[12px] px-2.5 py-1 rounded-full border '+(on?'bg-slate-800 text-white border-slate-800':'bg-white text-slate-600 border-slate-200 hover:border-slate-300')+'">'+s+'</button>'; }).join('');
    h += '<span class="font-mono text-[10px] uppercase tracking-wider text-slate-400 mx-1 ml-3">source</span>';
    h += srcs.map(function(s){ var on=filter.src===s[0]; return '<button data-src="'+s[0]+'" class="chip font-proxima text-[12px] px-2.5 py-1 rounded-full border '+(on?'bg-sky-600 text-white border-sky-600':'bg-white text-slate-600 border-slate-200 hover:border-slate-300')+'">'+s[1]+'</button>'; }).join('');
    if(sites.length){
      h += '<span class="font-mono text-[10px] uppercase tracking-wider text-slate-400 mx-1 ml-3">site</span>';
      h += sites.map(function(s){ var on=filter.site===s[0]; return '<button data-site="'+s[0]+'" class="chip font-proxima text-[12px] px-2.5 py-1 rounded-full border '+(on?'bg-[#37576B] text-white border-[#37576B]':'bg-white text-slate-600 border-slate-200 hover:border-slate-300')+'">'+esc(s[1])+'</button>'; }).join('');
    }
    document.getElementById('filters').innerHTML = h;
    document.querySelectorAll('.chip').forEach(function(b){ b.onclick = function(){
      if(b.dataset.k) filter.kind = b.dataset.k;
      if(b.dataset.sev) filter.sev = (filter.sev===b.dataset.sev?null:b.dataset.sev);
      if(b.dataset.src) filter.src = (filter.src===b.dataset.src?null:b.dataset.src);
      if(b.dataset.site) filter.site = (filter.site===b.dataset.site?null:b.dataset.site);
      renderFilters(); renderRows();
    };});
  }
  function renderRows(){
    var rows = S.tickets.slice().sort(function(a,b){ var ao=S.isOpen(a)?0:1, bo=S.isOpen(b)?0:1; return (ao-bo)||(a.updated<b.updated?1:-1); })
      .filter(function(t){
        if(filter.kind==='open' && !S.isOpen(t)) return false;
        if(filter.kind==='closed' && S.isOpen(t)) return false;
        if(filter.sev && t.severity!==filter.sev) return false;
        if(filter.src && S.sourceOf(t)!==filter.src) return false;
        if(filter.site && siteOf(t)!==filter.site) return false;
        return true;
      });
    document.getElementById('empty').classList.toggle('hidden', rows.length>0);
    document.getElementById('rows').innerHTML = rows.map(function(t){
      var open=S.isOpen(t), src=S.sourceOf(t), pg=S.page(t.page)||{name:t.page};
      return '<tr class="border-b border-slate-50 hover:bg-slate-50/60 cursor-pointer" onclick="location.href=\'sitemgmt-ticket.html?id='+t.id+'\'">'
        + '<td class="py-2 pl-4 pr-2 font-mono text-[11px] text-slate-400">#'+t.id+'</td>'
        + '<td class="py-2 px-2">'+badge(t.severity, S.sevColor[t.severity])+'</td>'
        + '<td class="py-2 px-2">'+badge(S.sourceLabel[src], S.sourceColor[src])+'</td>'
        + '<td class="py-2 px-2">'+badge(t.status, statusColor[t.status]||'bg-slate-100 text-slate-500')+'</td>'
        + '<td class="py-2 px-2 font-proxima text-[13px] '+(open?'text-slate-800':'text-slate-400 line-through')+'">'+esc(t.title)+'</td>'
        + '<td class="py-2 px-2"><div class="flex items-center gap-2">'
        +   (pg.surface ? '<span class="inline-flex items-center rounded border border-slate-200 bg-slate-50 px-1.5 py-[1px] font-mono text-[9.5px] uppercase tracking-wide text-slate-500 whitespace-nowrap">'+esc(SITELABEL[pg.surface]||pg.surface)+'</span>' : '')
        +   '<span class="font-proxima text-[12px] text-slate-500 truncate">'+esc(pg.name)+'</span>'
        + '</div></td>'
        + '<td class="py-2 px-2 font-mono text-[11px] text-slate-500">'+esc(t.assignee)+'</td>'
        + '<td class="py-2 px-2 pr-4 font-mono text-[11px] text-slate-400 tabular-nums">'+esc(t.updated)+'</td></tr>';
    }).join('');
  }
  function renderSummary(){
    var byStatus = { 'Triage':0, 'In progress':0, 'In review':0, 'Resolved':0, 'Closed':0 };
    S.tickets.forEach(function(t){ byStatus[t.status] = (byStatus[t.status]||0)+1; });
    var open = S.tickets.filter(function(t){ return S.isOpen(t); }).length, done = S.tickets.length - open;
    var bySev = { Blocker:0, Major:0, Minor:0, Polish:0 }; S.tickets.filter(function(t){ return S.isOpen(t); }).forEach(function(t){ bySev[t.severity]++; });
    var bySrc = { ai:0, dev:0, client:0 }; S.tickets.forEach(function(t){ bySrc[S.sourceOf(t)]++; });
    var eDone=0, eTot=0; S.tickets.forEach(function(t){ var w=S.sevWeight[t.severity]||1; eTot+=w; if(!S.isOpen(t)) eDone+=w; });
    var ePct = eTot ? Math.round(100*eDone/eTot) : 0;

    var FLOW = [['Triage',byStatus['Triage'],'bg-slate-300'],['In progress',byStatus['In progress'],'bg-sky-400'],['In review',byStatus['In review'],'bg-amber-400'],['Resolved / closed',done,'bg-emerald-500']];
    var h = '<div class="bg-white rounded-lg shadow-sm border border-zinc-950/5 p-4 mb-4">'
      + '<div class="flex items-center justify-between mb-3"><span class="font-display text-[14px] font-medium text-slate-800">Where tickets stand</span>'
      + '<span class="font-mono text-[10px] uppercase tracking-wider text-slate-400">lifecycle · reported → resolved</span></div>'
      + '<div class="flex items-stretch gap-1">'
      + FLOW.map(function(s,i){
          var last = i===FLOW.length-1;
          return '<div class="flex-1 rounded-md border '+(last?'border-emerald-200 bg-emerald-50/50':'border-slate-200 bg-slate-50/60')+' p-3">'
            + '<div class="flex items-center gap-2"><span class="size-2.5 rounded-full '+s[2]+'"></span>'
            + '<span class="font-display text-[12.5px] font-medium text-slate-700">'+s[0]+'</span>'
            + '<span class="ml-auto font-display text-[18px] font-semibold text-[#0F1722]">'+s[1]+'</span></div></div>'
            + (last?'':'<div class="flex items-center text-slate-300 text-[16px] px-0.5">›</div>');
        }).join('')
      + '</div>'
      // stats: resolution + severity + source
      + '<div class="grid grid-cols-1 md:grid-cols-3 gap-6 border-t border-slate-100 mt-4 pt-3">'
      + '<div><div class="flex items-center justify-between mb-1"><span class="font-mono text-[10px] uppercase tracking-wider text-slate-400">resolution</span><span class="font-display text-[16px] font-semibold tabular-nums">'+ePct+'%</span></div>'
      + '<div class="h-2 rounded-full bg-amber-100 overflow-hidden"><div class="h-full bg-emerald-500" style="width:'+ePct+'%"></div></div>'
      + '<div class="font-mono text-[11px] text-slate-500 mt-1"><span class="text-amber-600 font-semibold">'+open+'</span> open · <span class="text-emerald-600 font-semibold">'+done+'</span> done</div></div>'
      + '<div><div class="font-mono text-[10px] uppercase tracking-wider text-slate-400 mb-1.5">open by severity</div><div class="flex flex-wrap gap-x-3.5 gap-y-1">'
      + ['Blocker','Major','Minor','Polish'].map(function(sv){ return '<span class="inline-flex items-center gap-1.5 font-proxima text-[11.5px] '+(bySev[sv]?'text-slate-700':'text-slate-300')+'"><span class="size-2 rounded-full '+S.sevDot[sv]+'"></span>'+sv+' <span class="font-mono tabular-nums '+(bySev[sv]?'font-semibold':'')+'">'+bySev[sv]+'</span></span>'; }).join('')
      + '</div></div>'
      + '<div><div class="font-mono text-[10px] uppercase tracking-wider text-slate-400 mb-1.5">found by</div><div class="flex flex-wrap gap-x-3.5 gap-y-1">'
      + [['ai','AI'],['dev','Dev'],['client','Client']].map(function(s){ return '<span class="inline-flex items-center gap-1.5 font-proxima text-[11.5px] '+(bySrc[s[0]]?'text-slate-700':'text-slate-300')+'"><span class="inline-flex items-center rounded px-1.5 py-[1px] text-[10px] font-medium '+S.sourceColor[s[0]]+'">'+s[1]+'</span><span class="font-mono tabular-nums '+(bySrc[s[0]]?'font-semibold':'')+'">'+bySrc[s[0]]+'</span></span>'; }).join('')
      + '</div></div>'
      + '</div></div>';
    document.getElementById('summary').innerHTML = h;
  }
  // ── per-day flow charts (Opened / Resolved) — small multiples, shared y-max ──
  // added = tickets by `opened`; resolved = closed tickets by `updated` (the resolve date,
  // matching timelineFor). Single series each → title names it, no legend; per-bar hover tooltip.
  function parseDate(s){ var p=String(s).split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }
  function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function dayRange(start, end){ var out=[], d=parseDate(start), e=parseDate(end); while(d<=e){ out.push(ymd(d)); d.setDate(d.getDate()+1); } return out; }
  var MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function fmtDate(s){ var p=String(s).split('-'); return MON[+p[1]-1]+' '+(+p[2]); }
  function chartCard(title, total, series, max, barBg, accentText){
    var bars = series.map(function(p){
      var pct = Math.round(p.n/max*100);
      return '<div class="group relative flex-1 min-w-0 flex items-end h-full">'
        + (p.n>0 ? '<div class="w-full rounded-t-[2px] '+barBg+'" style="height:'+pct+'%"></div>' : '')
        + '<div class="pointer-events-none absolute bottom-full left-1/2 -translate-x-1/2 mb-1 hidden group-hover:block whitespace-nowrap z-10 rounded bg-[#0F1722] text-white font-mono text-[10px] px-1.5 py-1">'+fmtDate(p.date)+' · <span class="font-semibold">'+p.n+'</span></div>'
        + '</div>';
    }).join('');
    return '<div class="bg-white rounded-lg shadow-sm border border-zinc-950/5 p-4">'
      + '<div class="flex items-baseline justify-between mb-2"><span class="font-display text-[13px] font-medium text-slate-700">'+title+'</span>'
      + '<span class="font-display text-[18px] font-semibold '+accentText+' tabular-nums">'+total+'</span></div>'
      + '<div class="relative pt-4">'
      +   '<div class="absolute top-0 right-0 font-mono text-[9px] text-slate-300">max '+max+'</div>'
      +   '<div class="flex items-end gap-[2px] h-[80px] border-b border-slate-200">'+bars+'</div>'
      +   '<div class="flex items-center justify-between mt-1 font-mono text-[9px] text-slate-400"><span>'+fmtDate(series[0].date)+'</span><span>'+fmtDate(series[series.length-1].date)+'</span></div>'
      + '</div></div>';
  }
  function renderFlowCharts(){
    var added={}, closed={};
    S.tickets.forEach(function(t){ added[t.opened]=(added[t.opened]||0)+1; if(!S.isOpen(t)) closed[t.updated]=(closed[t.updated]||0)+1; });
    var keys = Object.keys(added).concat(Object.keys(closed)).sort();
    var days = dayRange(keys[0], S.asOf);
    var addedSeries  = days.map(function(d){ return { date:d, n: added[d]||0 }; });
    var closedSeries = days.map(function(d){ return { date:d, n: closed[d]||0 }; });
    var max = Math.max(1, Math.max.apply(null, addedSeries.concat(closedSeries).map(function(x){ return x.n; })));
    var totalAdded = S.tickets.length;
    var totalClosed = S.tickets.filter(function(t){ return !S.isOpen(t); }).length;
    document.getElementById('flowcharts').innerHTML =
        chartCard('Tickets opened / day',   totalAdded,  addedSeries,  max, 'bg-[#1F3F8F]', 'text-[#1F3F8F]')
      + chartCard('Tickets resolved / day', totalClosed, closedSeries, max, 'bg-emerald-500', 'text-emerald-600');
  }
  renderSummary(); renderFlowCharts(); renderFilters(); renderRows();
})();
</script>
<script src="../ds-nav.js"></script>
</body>
</html>
