<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Control Room · Site Management · TransportNY</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="_shared.css"/>
  <style>.font-display{font-family:Oswald,sans-serif}.font-proxima{font-family:'Source Sans 3',system-ui,sans-serif}.font-mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}</style>
</head>
<body class="tny-pane font-proxima text-[#0F1722]">
<!--
  sitemgmt-overview.html · SITE MANAGEMENT control room. One FULL-WIDTH card per pattern: a summary
  banner (segmented stage bar + tickets bar) and the pattern's pages laid out in columns, each →
  its page-QA detail. Below: a site activity timeline. Rendered from window.SITEMGMT.
-->
<div class="bg-[#ECEEF2]" data-dms-layout="app">
  <div class="relative isolate flex min-h-svh w-full max-lg:flex-col">
    <div class="flex-1 flex flex-col items-stretch max-w-full min-h-screen lg:ml-60">

      <!-- ════════ SIDENAV ════════ -->
      <aside class="fixed inset-y-0 left-0 w-60 max-lg:hidden z-30">
        <div class="flex flex-col w-60 h-full bg-[#12181F] border-r border-[#2a3545]">
          <a href="sitemgmt-overview.html" class="relative h-16 bg-[#0A0E13] border-b border-[#2a3545] flex items-center px-3">
            <div class="w-10 h-10 flex items-center justify-center flex-shrink-0 bg-[#1F3F8F] rounded text-white font-display font-bold text-[14px]">SM</div>
            <div class="flex-1 ml-3 min-w-0"><span class="font-display uppercase text-white text-[15px] tracking-wide truncate">Site Mgmt</span><div class="font-mono text-slate-400 text-[9px] uppercase tracking-[0.18em]">NYSDOT · TransportNY</div></div>
          </a>
          <div class="flex-1 py-1 overflow-y-auto">
            <div class="px-4 pt-4 pb-1 font-mono text-[10px] font-semibold text-slate-500 uppercase tracking-[0.2em]">Manage</div>
            <a href="sitemgmt-overview.html" class="font-proxima text-[13.5px] flex items-center px-4 py-2.5 bg-[#1e2530] text-white border-l-[3px] border-[#FACC15]"><svg class="size-[18px] mr-3 text-[#FACC15]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10h14V10"/></svg><span class="flex-1">Control Room</span></a>
            <a href="sitemgmt-tickets.html" class="font-proxima text-[13.5px] flex items-center px-4 py-2.5 hover:bg-[#1e2530] text-slate-300 border-l-[3px] border-transparent"><svg class="size-[18px] mr-3 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4V8Z"/><path d="M13 6v12"/></svg><span class="flex-1">Tickets</span></a>
            <div class="px-4 pt-4 pb-1 font-mono text-[10px] font-semibold text-slate-500 uppercase tracking-[0.2em]">Surfaces</div>
            <a href="tsmo-home.html" class="font-proxima text-[12.5px] flex items-center px-4 py-2 hover:bg-[#1e2530] text-slate-400 border-l-[3px] border-transparent"><span class="flex-1">TSMO (tsmo2)</span></a>
            <a href="freight-atlas-home.html" class="font-proxima text-[12.5px] flex items-center px-4 py-2 hover:bg-[#1e2530] text-slate-400 border-l-[3px] border-transparent"><span class="flex-1">Freight Atlas</span></a>
            <a href="map-21.html" class="font-proxima text-[12.5px] flex items-center px-4 py-2 hover:bg-[#1e2530] text-slate-400 border-l-[3px] border-transparent"><span class="flex-1">NPMRDS</span></a>
          </div>
          <div class="border-t border-[#2a3545] py-2 px-4 flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-[#37576B] to-[#1f3450] flex items-center justify-center text-white"><svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></div>
            <div class="flex-1 min-w-0"><div class="font-display uppercase text-white text-[12px] tracking-wide truncate">Delivery team</div><div class="font-mono text-slate-400 text-[10px] uppercase tracking-[0.18em] truncate">internal · QA</div></div>
          </div>
        </div>
      </aside>

      <div class="flex flex-1 items-start">
        <div class="flex-1 min-w-0 flex flex-col">
          <main class="mr-auto w-full max-w-[1460px] pl-12 pr-8 py-8">
            <div class="flex items-end justify-between mb-1">
              <div>
                <div class="font-mono text-[10px] uppercase tracking-[0.2em] text-slate-500 mb-1">// site management · QA workflow</div>
                <h1 class="font-display text-[30px] leading-none font-medium text-[#0F1722]">Control room</h1>
              </div>
              <div class="font-mono text-[11px] text-slate-500">as of <span id="asOf"></span></div>
            </div>
            <div id="summary" class="font-proxima text-[13px] text-slate-500 mb-6"></div>
            <div id="root"></div>
          </main>
          <footer class="w-full bg-white border-t border-zinc-950/10 mt-6">
            <div class="mr-auto w-full max-w-[1460px] pl-12 pr-8 py-4 flex items-center justify-between">
              <div class="flex gap-6 font-mono text-[10.5px] uppercase tracking-[0.16em] text-slate-500">
                <a href="sitemgmt-overview.html" class="hover:text-slate-900">control room</a>
                <a href="sitemgmt-tickets.html" class="hover:text-slate-900">tickets</a>
              </div>
              <span class="font-mono text-[11px] text-slate-500">© NYSDOT · TransportNY DMS · QA v0.1 · mockup</span>
            </div>
          </footer>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="sitemgmt-data.js"></script>
<script>
(function(){
  var S = window.SITEMGMT;
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function pct(n,d){ return d ? Math.round(100*n/d) : 0; }
  var STAGE_BAR = { 'In Development':'bg-amber-400', 'Dev Review':'bg-sky-400', 'Client Review':'bg-[#0a0e13]', 'Approved':'bg-emerald-500' };

  document.getElementById('asOf').textContent = S.asOf;
  var P = S.pages.length;
  var openT = S.tickets.filter(function(t){ return S.isOpen(t); }).length, closedT = S.tickets.length - openT;
  var approved = S.stageCounts()['Approved'];
  document.getElementById('summary').innerHTML =
    '<span class="font-semibold text-slate-700">'+S.surfaces.length+'</span> patterns · '
    + '<span class="font-semibold text-slate-700">'+P+'</span> pages · '
    + '<span class="font-semibold text-emerald-600">'+approved+'</span> approved · '
    + '<span class="font-semibold text-amber-600">'+openT+'</span> open / <span class="font-semibold text-emerald-600">'+closedT+'</span> done tickets';

  var html = '';

  // ── process banner: how delivery works ──
  var sc = S.stageCounts();
  var stageWho = { 'In Development':'our team', 'Dev Review':'our team', 'Client Review':'you', 'Approved':'done' };
  var stageDesc = { 'In Development':'build & fix AI-flagged issues', 'Dev Review':'internal QA sign-off', 'Client Review':'review & approve', 'Approved':'ready to publish' };
  html += '<div class="bg-white rounded-lg shadow-sm border border-zinc-950/5 p-4 mb-4">'
    + '<div class="flex items-center justify-between mb-3"><span class="font-display text-[14px] font-medium text-slate-800">How delivery works</span>'
    + '<span class="font-mono text-[10px] uppercase tracking-wider text-slate-400">AI flags issues · we fix &amp; sign off · you approve</span></div>'
    + '<div class="flex items-stretch gap-1">'
    + S.STAGES.map(function(st,i){
        var mine = st==='Client Review';
        var blk = '<div class="flex-1 rounded-md border '+(mine?'border-[#1F3F8F]/40 bg-[#1F3F8F]/[0.04]':'border-slate-200 bg-slate-50/60')+' p-3">'
          + '<div class="flex items-center gap-2"><span class="size-2.5 rounded-full '+STAGE_BAR[st]+'"></span>'
          + '<span class="font-display text-[13px] font-medium '+(mine?'text-[#1F3F8F]':'text-slate-700')+'">'+esc(st)+'</span>'
          + '<span class="ml-auto font-display text-[18px] font-semibold text-[#0F1722]">'+sc[st]+'</span></div>'
          + '<div class="font-mono text-[9px] uppercase tracking-wider '+(mine?'text-[#1F3F8F] font-semibold':'text-slate-400')+' mt-1">'+esc(stageWho[st])+'</div>'
          + '<div class="font-proxima text-[11px] text-slate-500 leading-snug">'+stageDesc[st]+'</div></div>';
        return blk + (i<S.STAGES.length-1 ? '<div class="flex items-center text-slate-300 text-[16px] px-0.5">›</div>' : '');
      }).join('')
    + '</div></div>';

  // ── for your review + priority work (2-col) ──
  var review = S.pages.filter(function(p){ return S.stageOf(p)==='Client Review'; });
  var prioOrder = { Now:0, Next:1, Later:2 };
  var prio = S.tickets.filter(function(t){ return S.isOpen(t) && (t.priority==='Now'||t.priority==='Next'); })
    .sort(function(a,b){ return prioOrder[a.priority]-prioOrder[b.priority]; });
  html += '<div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">';
  html += '<div class="bg-white rounded-lg shadow-sm border-2 border-[#1F3F8F]/25 p-4">'
    + '<div class="flex items-center justify-between border-b border-slate-100 pb-2 mb-1">'
    + '<span class="font-display text-[14px] font-medium text-[#1F3F8F]">For your review</span>'
    + '<span class="font-mono text-[10px] uppercase tracking-wider text-slate-400">'+review.length+' awaiting your approval</span></div>'
    + (review.length ? review.map(function(p){
        return '<div class="flex items-center gap-3 py-2 border-b border-slate-50 last:border-0">'
          + '<span class="size-2 rounded-full bg-[#0a0e13] flex-shrink-0"></span>'
          + '<a href="sitemgmt-page.html?id='+encodeURIComponent(p.id)+'" class="flex-1 min-w-0 truncate font-proxima text-[13px] text-slate-800 hover:text-[#1F3F8F]">'+esc(p.name)+'</a>'
          + '<span class="font-mono text-[10px] text-slate-400 hidden sm:inline">'+esc((S.surface(p.surface)||{}).label||p.surface)+'</span>'
          + '<button class="font-proxima text-[11.5px] px-2.5 py-1 rounded-md bg-[#1F3F8F] text-white hover:bg-[#18316f]">Approve</button>'
          + '<button class="font-proxima text-[11.5px] px-2.5 py-1 rounded-md border border-slate-200 text-slate-600 hover:border-slate-300">Changes</button></div>';
      }).join('') : '<div class="py-3 font-proxima text-[13px] text-slate-400">Nothing awaiting your review right now.</div>')
    + '</div>';
  html += '<div class="bg-white rounded-lg shadow-sm border border-zinc-950/5 p-4">'
    + '<div class="flex items-center justify-between border-b border-slate-100 pb-2 mb-1">'
    + '<span class="font-display text-[14px] font-medium text-slate-800">Priority work</span>'
    + '<span class="font-mono text-[10px] uppercase tracking-wider text-slate-400">what the team is on now</span></div>'
    + prio.slice(0,5).map(function(t){ var pg=S.page(t.page)||{name:t.page};
        return '<a href="sitemgmt-ticket.html?id='+t.id+'" class="flex items-center gap-2 py-1.5 hover:bg-slate-50/70 -mx-1 px-1 rounded">'
          + '<span class="inline-flex items-center rounded px-1.5 py-[2px] text-[10px] font-medium '+S.prioColor[t.priority]+'">'+esc(t.priority)+'</span>'
          + '<span class="inline-flex items-center rounded px-1.5 py-[2px] text-[10px] font-medium '+S.sevColor[t.severity]+'">'+esc(t.severity)+'</span>'
          + '<span class="flex-1 min-w-0 truncate font-proxima text-[12.5px] text-slate-700">'+esc(t.title)+'</span>'
          + '<span class="font-mono text-[10px] text-slate-400 truncate max-w-[26%]">'+esc(pg.name)+'</span></a>';
      }).join('')
    + '</div></div>';

  // ── full-width per-pattern cards ──
  html += '<div class="space-y-4 mb-6">';
  S.surfaces.forEach(function(s){
    var r = S.surfaceRollup(s.key);
    var tixDone = pct(r.closed, r.open + r.closed);
    var sp = S.pages.filter(function(p){ return p.surface===s.key; })
      .sort(function(a,b){ return S.STAGES.indexOf(S.stageOf(a))-S.STAGES.indexOf(S.stageOf(b)) || a.name.localeCompare(b.name); });

    html += '<div class="bg-white rounded-lg shadow-sm border border-zinc-950/5 p-5">'
      // ── summary banner ──
      + '<div class="flex flex-col lg:flex-row lg:items-start gap-4 lg:gap-8">'
        // identity
        + '<div class="lg:w-48 flex-shrink-0 flex items-baseline justify-between lg:block">'
        + '<div><div class="font-display text-[17px] font-medium text-[#0F1722] leading-tight">'+esc(s.label)+'</div>'
        + '<div class="font-mono text-[10px] uppercase tracking-wider text-slate-400 mt-0.5">'+esc(s.sub||s.key)+'</div></div>'
        + '<div class="font-mono text-[11px] text-slate-500 lg:mt-2"><span class="font-display text-[18px] font-semibold text-[#0F1722]">'+r.pages+'</span> pages</div></div>'
        // stage bar + legend
        + '<div class="flex-1 min-w-0">'
        + '<div class="flex h-4 rounded-full overflow-hidden bg-slate-100 mb-2">'
        + S.STAGES.map(function(st){ var n=r.stages[st], w=pct(n,r.pages); return n>0 ? '<div class="'+STAGE_BAR[st]+'" style="width:'+w+'%" title="'+esc(st)+': '+n+'"></div>' : ''; }).join('')
        + '</div>'
        + '<div class="flex flex-wrap gap-x-4 gap-y-1">'
        + S.STAGES.map(function(st){ var n=r.stages[st]; return '<span class="inline-flex items-center gap-1.5 font-proxima text-[11.5px] '+(n?'text-slate-600':'text-slate-300')+'"><span class="size-2 rounded-full '+STAGE_BAR[st]+'"></span>'+esc(st)+' <span class="font-mono tabular-nums '+(n?'text-slate-800 font-semibold':'')+'">'+n+'</span></span>'; }).join('')
        + '</div></div>'
        // tickets — bar on top (aligns with the stage bar), caption below (aligns with the legend)
        + '<div class="lg:w-64 flex-shrink-0">'
        + '<div class="h-4 rounded-full bg-amber-100 overflow-hidden mb-2"><div class="h-full bg-emerald-500" style="width:'+tixDone+'%"></div></div>'
        + '<div class="flex items-center justify-between"><span class="font-mono text-[10px] uppercase tracking-wider text-slate-400">tickets</span>'
        + '<span class="font-mono text-[11.5px] tabular-nums"><span class="text-amber-600 font-semibold">'+r.open+'</span> open · <span class="text-emerald-600 font-semibold">'+r.closed+'</span> done</span></div></div>'
      + '</div>'
      // ── pages as a table (mirrors the live DMS Spreadsheet) ──
      + '<div class="mt-4 border-t border-slate-100 pt-3 overflow-x-auto">'
      + '<table class="w-full text-left border-collapse">'
      + '<thead><tr class="font-mono text-[10px] uppercase tracking-wider text-slate-400 border-b border-slate-100">'
      + '<th class="py-1.5 pr-3 font-medium">Page</th><th class="py-1.5 pr-3 font-medium">Stage</th>'
      + '<th class="py-1.5 pr-3 font-medium">Next step</th><th class="py-1.5 pr-3 font-medium text-right">Open</th><th class="py-1.5"></th>'
      + '</tr></thead><tbody>'
      + sp.map(function(p){ var st=S.stageOf(p), open=S.openTicketsFor(p.id).length;
          return '<tr class="border-b border-slate-50 hover:bg-slate-50/70">'
            + '<td class="py-1.5 pr-3"><a href="sitemgmt-page.html?id='+encodeURIComponent(p.id)+'" class="font-proxima text-[12.5px] text-slate-800 hover:text-[#1F3F8F]">'+esc(p.name)+'</a></td>'
            + '<td class="py-1.5 pr-3"><span class="inline-flex items-center rounded px-1.5 py-[2px] text-[10px] font-medium '+S.stageColor[st]+'">'+esc(st)+'</span></td>'
            + '<td class="py-1.5 pr-3 font-proxima text-[12px] text-slate-500">'+esc(S.nextStepOf(p))+'</td>'
            + '<td class="py-1.5 pr-3 text-right font-mono text-[11px] '+(open?'text-amber-600 font-semibold':'text-slate-300')+'">'+open+'</td>'
            + '<td class="py-1.5 text-right"><a href="sitemgmt-page.html?id='+encodeURIComponent(p.id)+'" class="font-mono text-[10px] text-slate-400 hover:text-[#1F3F8F]">open &rarr;</a></td>'
            + '</tr>';
        }).join('')
      + '</tbody></table></div></div>';
  });
  html += '</div>';

  // ── site activity timeline (full width) ──
  var allEv = [];
  S.pages.forEach(function(p){ S.timelineFor(p.id).forEach(function(e){ e.page = p.name; allEv.push(e); }); });
  allEv.sort(function(a,b){ return a.when<b.when?1:(a.when>b.when?-1:0); });
  var dotKind = { opened:'bg-amber-400', resolved:'bg-emerald-500', comment:'bg-slate-300' };
  html += '<div class="bg-white rounded-lg shadow-sm border border-zinc-950/5 p-4">'
    + '<div class="flex items-center justify-between border-b border-slate-100 pb-2 mb-2"><span class="font-display text-[14px] font-medium text-slate-800">Recent activity</span>'
    + '<span class="font-mono text-[10px] uppercase tracking-wider text-slate-400">work timeline</span></div>'
    + '<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8">'
    + allEv.slice(0,10).map(function(e){
        return '<div class="flex items-center gap-3 py-1.5"><span class="size-2 rounded-full '+(dotKind[e.kind]||'bg-slate-300')+' flex-shrink-0"></span>'
          + '<span class="flex-1 min-w-0 truncate font-proxima text-[12.5px] text-slate-700">'+esc(e.text)+'</span>'
          + '<span class="font-mono text-[10px] text-slate-400 truncate max-w-[24%]">'+esc(e.page)+'</span>'
          + '<span class="font-mono text-[10px] text-slate-400 tabular-nums">'+esc(e.when.slice(5))+'</span></div>';
      }).join('') + '</div></div>';

  document.getElementById('root').innerHTML = html;
})();
</script>
<script src="../ds-nav.js"></script>
</body>
</html>
