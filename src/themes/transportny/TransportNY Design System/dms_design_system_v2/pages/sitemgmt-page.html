<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Page QA · Site Management · TransportNY</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="_shared.css"/>
  <style>.font-display{font-family:Oswald,sans-serif}.font-proxima{font-family:'Source Sans 3',system-ui,sans-serif}.font-mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}</style>
</head>
<body class="tny-pane font-proxima text-[#0F1722]">
<!--
  sitemgmt-page.html · per-PAGE QA WORKFLOW. AI review is a TRIGGER that adds tickets; the pipeline
  is In Development → Dev Review → Client Review → Approved. Shows: what the page does, the stage +
  next step, work completed (open vs closed), the dev/client gates, features/user stories, the page's
  tickets, and a timeline of the work. Reads ?id=<pageId>. Rendered from window.SITEMGMT.
-->
<div class="bg-[#ECEEF2]" data-dms-layout="app">
  <div class="relative isolate flex min-h-svh w-full max-lg:flex-col">
    <div class="flex-1 flex flex-col items-stretch max-w-full min-h-screen lg:ml-60">

      <!-- ════════ SIDENAV ════════ -->
      <aside class="fixed inset-y-0 left-0 w-60 max-lg:hidden z-30">
        <div class="flex flex-col w-60 h-full bg-[#12181F] border-r border-[#2a3545]">
          <a href="sitemgmt-overview.html" class="relative h-16 bg-[#0A0E13] border-b border-[#2a3545] flex items-center px-3">
            <div class="w-10 h-10 flex items-center justify-center flex-shrink-0 bg-[#1F3F8F] rounded text-white font-display font-bold text-[14px]">SM</div>
            <div class="flex-1 ml-3 min-w-0"><span class="font-display uppercase text-white text-[15px] tracking-wide truncate">Site Mgmt</span><div class="font-mono text-slate-400 text-[9px] uppercase tracking-[0.18em]">NYSDOT · TransportNY</div></div>
          </a>
          <div class="flex-1 py-1 overflow-y-auto">
            <div class="px-4 pt-4 pb-1 font-mono text-[10px] font-semibold text-slate-500 uppercase tracking-[0.2em]">Manage</div>
            <a href="sitemgmt-overview.html" class="font-proxima text-[13.5px] flex items-center px-4 py-2.5 bg-[#1e2530] text-white border-l-[3px] border-[#FACC15]"><svg class="size-[18px] mr-3 text-[#FACC15]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10h14V10"/></svg><span class="flex-1">Control Room</span></a>
            <a href="sitemgmt-tickets.html" class="font-proxima text-[13.5px] flex items-center px-4 py-2.5 hover:bg-[#1e2530] text-slate-300 border-l-[3px] border-transparent"><svg class="size-[18px] mr-3 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4V8Z"/><path d="M13 6v12"/></svg><span class="flex-1">Tickets</span></a>
            <div class="px-4 pt-4 pb-1 font-mono text-[10px] font-semibold text-slate-500 uppercase tracking-[0.2em]">Surfaces</div>
            <a href="tsmo-home.html" class="font-proxima text-[12.5px] flex items-center px-4 py-2 hover:bg-[#1e2530] text-slate-400 border-l-[3px] border-transparent"><span class="flex-1">TSMO (tsmo2)</span></a>
            <a href="freight-atlas-home.html" class="font-proxima text-[12.5px] flex items-center px-4 py-2 hover:bg-[#1e2530] text-slate-400 border-l-[3px] border-transparent"><span class="flex-1">Freight Atlas</span></a>
            <a href="map-21.html" class="font-proxima text-[12.5px] flex items-center px-4 py-2 hover:bg-[#1e2530] text-slate-400 border-l-[3px] border-transparent"><span class="flex-1">NPMRDS</span></a>
          </div>
          <div class="border-t border-[#2a3545] py-2 px-4 flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-[#37576B] to-[#1f3450] flex items-center justify-center text-white"><svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></div>
            <div class="flex-1 min-w-0"><div class="font-display uppercase text-white text-[12px] tracking-wide truncate">Delivery team</div><div class="font-mono text-slate-400 text-[10px] uppercase tracking-[0.18em] truncate">internal · QA</div></div>
          </div>
        </div>
      </aside>

      <div class="flex flex-1 items-start">
        <div class="flex-1 flex flex-col h-full bg-[#ECEEF2] min-w-0">

          <!-- ═════════ BREADCRUMB BAR ═════════ -->
          <div class="w-full bg-white border-b border-zinc-950/10">
            <div class="mr-auto w-full max-w-[1480px] pl-12 pr-8">
              <nav class="h-11 flex items-center font-mono text-[10.5px] uppercase tracking-[0.18em]" aria-label="Breadcrumb">
                <a href="sitemgmt-overview.html" class="inline-flex items-center gap-1.5 text-slate-500 hover:text-[#0f1722]"><svg class="size-4 text-[#37576B] relative -top-[1px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10h14V10"/></svg>Site Management</a>
                <span class="text-slate-300 px-2">/</span>
                <a href="sitemgmt-overview.html" class="text-slate-500 hover:text-[#0f1722]">Page QA</a>
                <span class="text-slate-300 px-2">/</span>
                <span id="crumb" class="text-[#0f1722]"></span>
              </nav>
            </div>
          </div>

          <!-- ═════════ HEADER BAND (filled by JS) ═════════ -->
          <div class="w-full bg-white border-b border-zinc-950/10">
            <div class="mr-auto w-full max-w-[1480px] pl-12 pr-8 py-5"><div id="hdr"></div></div>
          </div>

          <!-- ═════════ CONTENT BAND (filled by JS) ═════════ -->
          <div class="w-full bg-[#ECEEF2] pt-6 pb-12">
            <div class="mr-auto w-full max-w-[1480px] pl-12 pr-8"><div id="pageqa"></div></div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="sitemgmt-data.js"></script>
<script>
(function(){
  var S = window.SITEMGMT;
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function badge(text, cls){ return '<span class="inline-flex items-center rounded px-2 py-[3px] text-[11px] font-medium '+cls+'">'+esc(text)+'</span>'; }

  var id = new URLSearchParams(location.search).get('id') || 'tsmo2:home';
  var p = S.page(id); if (!p) { id = S.pages[0].id; p = S.page(id); }
  var surf = S.surface(p.surface) || { label: p.surface, sub: '' };

  var stage = S.stageOf(p), next = S.nextStepOf(p), gates = S.gatesFor(p);
  var allT = S.ticketsFor(p.id).slice().sort(function(a,b){ var ao=S.isOpen(a)?0:1, bo=S.isOpen(b)?0:1; return (ao-bo)||(a.id-b.id); });
  var openCount = S.openTicketsFor(p.id).length, closedCount = allT.length - openCount;
  var aiCount = allT.filter(function(t){ return S.sourceOf(t)==='ai'; }).length;
  var effort = S.effortFor(p.id);
  var stages = S.STAGES, cur = stages.indexOf(stage);
  var actor = { 'Proposed':'product', 'Design':'design', 'Implemented':'dev', 'QA':'qa', 'Dev Acceptance':'dev', 'Client Acceptance':'client' };
  // stage gates — ONE per pipeline stage, aligned 1:1 with `stages`. The current stage's gate is the
  // action that advances the page to the next stage (so the gates line up with the stepper above).
  var GATES = [
    { label: 'Accept user stories', who: 'product accepts the scope',      verb: 'Accept stories' },
    { label: 'Approve design',      who: 'design signs off on the mockup', verb: 'Approve design' },
    { label: 'Build complete',      who: 'dev finishes building the page', verb: 'Mark built' },
    { label: 'Pass QA',             who: 'QA clears the findings',         verb: 'Pass QA' },
    { label: 'Dev sign-off',        who: 'dev sends it to the client',     verb: 'Sign off' },
    { label: 'Client approval',     who: 'client approves the page',       verb: 'Approve page' },
  ];

  function node(label, i){
    var done = i < cur, isCur = i === cur;
    var circle = done
      ? '<span class="size-7 rounded-full bg-emerald-500 text-white flex items-center justify-center shadow-sm"><svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l4.5 4.5L19 7"/></svg></span>'
      : isCur
        ? '<span class="size-7 rounded-full bg-[#1F3F8F] text-white flex items-center justify-center text-[12px] font-semibold shadow ring-4 ring-[#1F3F8F]/15">'+(i+1)+'</span>'
        : '<span class="size-7 rounded-full bg-white border border-slate-300 text-slate-400 flex items-center justify-center text-[12px] font-semibold">'+(i+1)+'</span>';
    var line = i < stages.length-1 ? '<div class="flex-1 h-[2px] '+(i<cur?'bg-emerald-400':'bg-slate-200')+' mx-1"></div>' : '';
    return '<div class="flex items-center '+(i<stages.length-1?'flex-1':'')+'">'
      + '<div class="flex flex-col items-center text-center w-[120px]">'+circle
      + '<div class="mt-1.5 font-display text-[12.5px] '+(isCur?'text-[#0F1722] font-semibold':done?'text-slate-600':'text-slate-400')+'">'+label+'</div>'
      + '<div class="font-mono text-[9px] uppercase tracking-wider '+(isCur?'text-[#1F3F8F]':'text-slate-300')+'">'+(actor[label]==='—'?'':actor[label])+'</div>'
      + '</div>'+line+'</div>';
  }
  function gateRow(title, who, done, isNext){
    var icon = done
      ? '<span class="size-6 rounded-full bg-emerald-500 text-white flex items-center justify-center"><svg class="size-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l4.5 4.5L19 7"/></svg></span>'
      : '<span class="size-6 rounded-full border-2 '+(isNext?'border-[#1F3F8F]':'border-slate-300')+' bg-white"></span>';
    var act = done
      ? '<span class="font-mono text-[10px] uppercase tracking-wider text-emerald-600">passed</span>'
      : isNext
        ? '<button class="font-proxima text-[12px] px-3 py-1 rounded-md bg-[#1F3F8F] text-white hover:bg-[#18316f]">'+(title.indexOf('Dev')===0?'Mark ready':'Approve')+'</button>'
        : '<span class="font-mono text-[10px] uppercase tracking-wider text-slate-300">waiting</span>';
    return '<div class="flex items-center gap-3 py-2.5">'+icon
      + '<div class="flex-1 min-w-0"><div class="font-proxima text-[13.5px] '+(done?'text-slate-700':'text-slate-800 font-medium')+'">'+esc(title)+'</div>'
      + '<div class="font-mono text-[10px] uppercase tracking-wider text-slate-400">'+esc(who)+'</div></div>'+act+'</div>';
  }
  function ticketRow(t){
    var open = S.isOpen(t), src = S.sourceOf(t);
    return '<a href="sitemgmt-ticket.html?id='+t.id+'" class="flex items-center gap-3 py-2 hover:bg-slate-50/70 -mx-1 px-1 rounded">'
      + badge(t.severity, S.sevColor[t.severity]) + badge(S.sourceLabel[src], S.sourceColor[src])
      + '<span class="flex-1 min-w-0 truncate font-proxima text-[13px] '+(open?'text-slate-700':'text-slate-400 line-through')+'">'+esc(t.title)+'</span>'
      + '<span class="font-mono text-[10px] '+(open?'text-slate-500':'text-emerald-600')+'">'+esc(t.status)+'</span>'
      + '<span class="font-mono text-[11px] text-slate-300">#'+t.id+'</span></a>';
  }
  function fact(label, val){
    return '<div class="flex items-center justify-between gap-2 py-1.5 border-b border-slate-50 last:border-0">'
      + '<span class="font-mono text-[10px] uppercase tracking-wider text-slate-400">'+esc(label)+'</span>'
      + '<span class="font-proxima text-[12.5px] text-slate-700 text-right">'+val+'</span></div>';
  }
  function bar(pct, cls){ return '<div class="h-2 w-full rounded-full bg-slate-100 overflow-hidden"><div class="h-full rounded-full '+(cls||'bg-emerald-500')+'" style="width:'+pct+'%"></div></div>'; }
  var dotKind = { opened:'bg-amber-400', resolved:'bg-emerald-500', comment:'bg-slate-300' };
  function tlRow(e, last){
    return '<div class="relative pl-6 '+(last?'':'pb-4')+'">'
      + (last?'':'<div class="absolute left-[5px] top-3 bottom-0 w-px bg-slate-200"></div>')
      + '<span class="absolute left-0 top-1.5 size-2.5 rounded-full '+(dotKind[e.kind]||'bg-slate-300')+' ring-2 ring-white"></span>'
      + '<div class="flex items-baseline justify-between gap-2"><span class="font-proxima text-[12.5px] text-slate-700">'+esc(e.text)+'</span>'
      + '<span class="font-mono text-[10px] text-slate-400 tabular-nums flex-shrink-0">'+esc(e.when)+'</span></div></div>';
  }

  // ── breadcrumb crumb + full-width header band (identity · stage) ──
  document.getElementById('crumb').textContent = p.name;
  document.getElementById('hdr').innerHTML =
    '<div class="flex items-start justify-between gap-6">'
    + '<div class="min-w-0">'
      + '<div class="font-mono text-[10.5px] uppercase tracking-[0.22em] text-slate-400 mb-1.5">// page QA</div>'
      + '<div class="flex items-end gap-3 flex-wrap">'
        + '<h1 class="font-display font-semibold text-[28px] leading-none tracking-tight uppercase text-[#0F1722]">'+esc(p.name)+'<span class="text-[#CA8A04]">.</span></h1>'
        + '<span class="inline-flex items-center h-6 px-2.5 rounded-[4px] bg-[#1F3F8F]/10 text-[#1F3F8F] font-mono text-[10.5px] uppercase tracking-wide">'+esc(surf.label)+'</span>'
        + '<span class="font-mono text-[11px] text-slate-400">'+esc(p.route)+'</span>'
      + '</div>'
      + '<p class="font-proxima text-[13.5px] text-slate-600 leading-snug mt-2 max-w-3xl">'+esc(S.descFor(id))+'</p>'
      + '<div class="flex flex-wrap items-center gap-2 mt-3">'+badge(p.build, S.buildColor[p.build])+badge(p.data, S.dataColor[p.data])
        + '<span class="font-mono text-[11px] text-slate-400 ml-1">owner '+esc(p.owner)+'</span>'
        + '<span class="font-mono text-[11px] text-slate-400">updated '+esc(p.updated)+'</span></div>'
    + '</div>'
    + '<div class="flex flex-col items-end gap-2 flex-shrink-0">'
      + '<div class="inline-flex items-center rounded-md border border-zinc-950/10 bg-slate-50 p-0.5 font-mono text-[10.5px] uppercase tracking-wide">'
        + '<span class="px-3 py-1 rounded-[5px] bg-[#1F3F8F] text-white">QA</span>'
        + '<a href="sitemgmt-design.html?id='+encodeURIComponent(id)+'" class="px-3 py-1 rounded-[5px] text-slate-500 hover:text-slate-800">Design</a>'
      + '</div>'
      + '<span class="inline-flex items-center rounded-md px-3 h-7 text-[12px] font-medium '+S.stageColor[stage]+'">'+esc(stage)+'</span>'
    + '</div>'
    + '</div>';

  var html = '';
  var STAGE_HEX = { 'Proposed':'#a1a1aa', 'Design':'#8b5cf6', 'Implemented':'#f59e0b', 'QA':'#38bdf8', 'Dev Acceptance':'#14b8a6', 'Client Acceptance':'#10b981' };
  var storyStatusCls = { proposed:'border-amber-200 bg-amber-50 text-amber-700', accepted:'border-sky-200 bg-sky-50 text-sky-700', verified:'border-emerald-200 bg-emerald-50 text-emerald-700' };
  var storyDot = { proposed:'bg-amber-400', accepted:'bg-sky-500', verified:'bg-emerald-500' };
  var caret = '<svg class="size-3 text-slate-400 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>';

  // ── two-column grid: MAIN (tickets · stories · timeline) + sidebar (one page-status card) ──
  html += '<div class="grid grid-cols-1 lg:grid-cols-[1fr_340px] gap-5"><div class="space-y-5">';

  // tickets
  html += '<div class="bg-white rounded-lg shadow-sm border border-zinc-950/5 p-4">'
    + '<div class="flex items-center justify-between border-b border-slate-100 pb-2 mb-2">'
    + '<span class="font-display text-[14px] font-medium text-slate-800">Tickets</span>'
    + '<div class="flex items-center gap-2"><span class="font-mono text-[10px] uppercase tracking-wider text-slate-400">'+openCount+' open · '+closedCount+' closed</span>'
    + '<button id="btnAddTicket" class="font-proxima text-[11.5px] px-2.5 py-1 rounded-md bg-[#1F3F8F] text-white hover:bg-[#18316f]">+ Add ticket</button></div></div>'
    + '<div id="tixlist" class="divide-y divide-slate-50">'
    + (allT.length ? allT.map(ticketRow).join('') : '<div class="py-3 font-proxima text-[13px] text-slate-400">No tickets for this page.</div>') + '</div></div>';

  // features & user stories (moved to the MAIN column; each carries an editable status, like the live page)
  var stories = S.storiesFor(id);
  html += '<div class="bg-white rounded-lg shadow-sm border border-zinc-950/5 p-4">'
    + '<div class="flex items-center justify-between border-b border-slate-100 pb-2 mb-1">'
    + '<span class="font-display text-[14px] font-medium text-slate-800">Features &amp; user stories</span>'
    + '<button class="font-proxima text-[11.5px] px-2.5 py-1 rounded-md border border-slate-200 text-slate-600 hover:border-slate-300">+ Add story</button></div>'
    + '<div class="divide-y divide-slate-50">'
    + stories.map(function(s,i){
        var ss = i===0 ? 'verified' : (i===stories.length-1 ? 'proposed' : 'accepted');
        return '<div class="flex items-center gap-3 py-2.5">'
          + '<span class="flex-1 min-w-0 font-proxima text-[13.5px] text-slate-700 leading-snug">'+esc(s)+'</span>'
          + '<button class="flex-shrink-0 inline-flex items-center gap-1.5 rounded-md border px-2.5 h-7 font-mono text-[10.5px] uppercase tracking-wide '+storyStatusCls[ss]+'"><span class="size-2 rounded-full '+storyDot[ss]+'"></span>'+ss+caret+'</button>'
        + '</div>';
      }).join('')
    + '</div></div>';

  // timeline
  var tl = S.timelineFor(p.id);
  html += '<div class="bg-white rounded-lg shadow-sm border border-zinc-950/5 p-4">'
    + '<div class="flex items-center justify-between border-b border-slate-100 pb-2 mb-3">'
    + '<span class="font-display text-[14px] font-medium text-slate-800">Timeline</span>'
    + '<span class="font-mono text-[10px] uppercase tracking-wider text-slate-400">work history</span></div>'
    + (tl.length ? tl.map(function(e,i){ return tlRow(e, i===tl.length-1); }).join('') : '<div class="py-2 font-proxima text-[13px] text-slate-400">No activity yet.</div>')
    + '</div>';

  html += '</div>'; // end main

  // ── sidebar: ONE emphasized Page status card — set the stage (single dropdown) + details + work ──
  html += '<div class="space-y-5">';
  html += '<div class="bg-white rounded-lg shadow-md border border-zinc-950/10 overflow-hidden lg:sticky lg:top-6">'
    + '<div class="h-1.5" style="background:'+(STAGE_HEX[stage]||'#a1a1aa')+'"></div>'
    + '<div class="p-4 border-b border-slate-100">'
      + '<div class="font-mono text-[10px] uppercase tracking-[0.2em] text-slate-400 mb-3">// page status</div>'
      + '<div class="font-mono text-[10px] uppercase tracking-wider text-slate-400 mb-1">Pipeline stage</div>'
      + '<button class="w-full h-11 inline-flex items-center justify-between gap-2 rounded-md border border-[#37576B] ring-2 ring-[#37576B]/15 bg-white px-3 hover:bg-slate-50">'
        + '<span class="inline-flex items-center gap-2.5"><span class="size-3 rounded-full" style="background:'+(STAGE_HEX[stage]||'#a1a1aa')+'"></span>'
        + '<span class="font-display text-[16px] font-medium text-[#0F1722]">'+esc(stage)+'</span></span>'+caret+'</button>'
      + '<div class="mt-3 flex items-center">'
        + stages.map(function(st,i){
            var dn = i<cur, isc = i===cur;
            var node = dn
              ? '<span class="size-5 rounded-full bg-emerald-500 text-white flex items-center justify-center flex-shrink-0" title="'+esc(st)+'"><svg class="size-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M5 12l4.5 4.5L19 7"/></svg></span>'
              : isc
                ? '<span class="size-5 rounded-full text-white flex items-center justify-center text-[9px] font-semibold flex-shrink-0 ring-4 ring-black/[0.06]" style="background:'+(STAGE_HEX[stage]||'#1F3F8F')+'" title="'+esc(st)+'">'+(i+1)+'</span>'
                : '<span class="size-5 rounded-full bg-white border border-slate-300 text-slate-400 flex items-center justify-center text-[9px] font-semibold flex-shrink-0" title="'+esc(st)+'">'+(i+1)+'</span>';
            return node + (i<stages.length-1 ? '<span class="flex-1 h-0.5 '+(i<cur?'bg-emerald-400':'bg-slate-200')+'"></span>' : '');
          }).join('')
      + '</div>'
      + '<div class="mt-1.5 font-mono text-[10px] uppercase tracking-wider text-slate-400">step '+(cur+1)+' of '+stages.length+'</div>'
      + '<div class="mt-2 flex items-start gap-2 font-proxima text-[12.5px] text-slate-600"><span class="font-mono text-[10px] uppercase tracking-wider text-slate-400 mt-[3px] flex-shrink-0">next</span><span>'+esc(next)+'</span></div>'
    + '</div>'
    + '<div class="p-4 border-b border-slate-100">'
      + fact('Surface', esc(surf.label)) + fact('Route', '<span class="font-mono text-[11px]">'+esc(p.route)+'</span>')
      + fact('Owner', esc(p.owner)) + fact('Build', badge(p.build, S.buildColor[p.build]))
      + fact('Data', badge(p.data, S.dataColor[p.data])) + fact('Updated', '<span class="font-mono text-[11px]">'+esc(p.updated)+'</span>')
    + '</div>'
    + '<div class="p-4">'
      + '<div class="flex items-center justify-between mb-2"><span class="font-mono text-[10px] uppercase tracking-wider text-slate-400">Work completed</span><span class="font-display text-[18px] font-semibold tabular-nums text-[#0F1722]">'+effort.pct+'%</span></div>'
      + bar(effort.pct, 'bg-[#1F3F8F]')
      + '<div class="flex items-center justify-between mt-2 font-mono text-[11px] text-slate-500"><span><span class="text-emerald-600 font-semibold">'+closedCount+'</span> closed · <span class="text-amber-600 font-semibold">'+openCount+'</span> open</span><span class="text-slate-400">'+effort.done+'/'+effort.total+' pts</span></div>'
    + '</div>'
  + '</div>';
  html += '</div></div>';
  document.getElementById('pageqa').innerHTML = html;

  // ── Add-ticket MODAL — mock of the DMS modal section-group flow: the header button
  // (click_publish provider) opens an isModal group holding an allowAdddNew Card whose
  // target-page field is PRE-FILLED from the page's ?key= filter (usePageParams). ──
  var sevOpts = ['Blocker','Major','Minor','Polish'], prioOpts = ['Now','Next','Later'], srcOpts = [['client','Client'],['dev','Dev'],['ai','AI']];
  function opt(list){ return list.map(function(o){ var v=Array.isArray(o)?o[0]:o, l=Array.isArray(o)?o[1]:o; return '<option value="'+v+'">'+l+'</option>'; }).join(''); }
  function mLbl(t){ return '<div class="font-mono text-[10px] uppercase tracking-[0.18em] text-slate-400 mb-1">'+t+'</div>'; }
  var inputCls = 'w-full rounded-md border border-slate-200 bg-white px-3 py-2 font-proxima text-[13px] text-slate-700 focus:outline-none focus:border-[#1F3F8F]';
  var modal = document.createElement('div');
  modal.id = 'addTicketModal';
  modal.className = 'hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50';
  modal.innerHTML = '<div class="relative bg-white rounded-lg shadow-xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">'
    + '<div class="p-5">'
    + '<div class="flex items-center justify-between border-b border-slate-100 pb-2 mb-3">'
    +   '<span class="font-display text-[15px] font-medium text-slate-800 uppercase tracking-tight">New ticket</span>'
    +   '<button id="mClose" class="text-slate-400 hover:text-slate-700 text-xl leading-none">✕</button></div>'
    + '<div class="mb-3">'+mLbl('target page · pre-filled from this page')
    +   '<div class="flex items-center gap-2 rounded-md bg-slate-50 border border-slate-100 px-3 py-2">'
    +     '<span class="font-proxima text-[13px] text-slate-700 font-medium">'+esc(surf.label)+' / '+esc(p.name)+'</span>'
    +     '<span class="font-mono text-[11px] text-slate-400">'+esc(p.route)+'</span>'
    +     '<span class="ml-auto inline-flex items-center rounded px-1.5 py-[1px] text-[10px] font-medium '+(S.stageColor[stage]||'bg-slate-100 text-slate-600')+'">'+esc(stage)+'</span></div></div>'
    + '<div class="mb-3">'+mLbl('title')+'<input id="mTitle" class="'+inputCls+'" placeholder="Short, specific summary…"/></div>'
    + '<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">'
    +   '<div>'+mLbl('severity')+'<select id="mSev" class="'+inputCls+'">'+opt(sevOpts)+'</select></div>'
    +   '<div>'+mLbl('priority')+'<select id="mPrio" class="'+inputCls+'">'+opt(prioOpts)+'</select></div>'
    +   '<div>'+mLbl('source')+'<select id="mSrc" class="'+inputCls+'">'+opt(srcOpts)+'</select></div>'
    +   '<div>'+mLbl('assignee')+'<input id="mWho" class="'+inputCls+'" placeholder="initials"/></div></div>'
    + '<div class="mb-3">'+mLbl('description')+'<textarea id="mDesc" rows="3" class="'+inputCls+' resize-none" placeholder="What’s wrong?"></textarea></div>'
    + '<div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">'
    +   '<div>'+mLbl('steps to reproduce')+'<textarea rows="2" class="'+inputCls+' resize-none"></textarea></div>'
    +   '<div>'+mLbl('expected')+'<textarea rows="2" class="'+inputCls+' resize-none"></textarea></div>'
    +   '<div>'+mLbl('actual')+'<textarea rows="2" class="'+inputCls+' resize-none"></textarea></div></div>'
    + '<div class="flex justify-end gap-2">'
    +   '<button id="mCancel" class="font-proxima text-[13px] px-4 py-1.5 rounded-md border border-slate-200 text-slate-600 hover:bg-slate-50">Cancel</button>'
    +   '<button id="mAdd" class="font-proxima text-[13px] px-4 py-1.5 rounded-md bg-[#1F3F8F] text-white hover:bg-[#18316f]">Add ticket</button></div>'
    + '</div>';
  document.body.appendChild(modal);
  function mShow(){ modal.classList.remove('hidden'); }
  function mHide(){ modal.classList.add('hidden'); }
  document.getElementById('btnAddTicket').onclick = mShow;
  document.getElementById('mClose').onclick = mHide;
  document.getElementById('mCancel').onclick = mHide;
  modal.addEventListener('click', function(e){ if(e.target === modal) mHide(); });
  document.getElementById('mAdd').onclick = function(){
    var title = document.getElementById('mTitle').value || 'Untitled ticket';
    var sev = document.getElementById('mSev').value;
    var row = document.createElement('div');
    row.innerHTML = '<div class="flex items-center gap-3 py-2 -mx-1 px-1 rounded bg-amber-50/60">'
      + '<span class="font-mono text-[11px] text-slate-400">#new</span>'
      + '<span class="inline-flex items-center rounded px-2 py-[3px] text-[11px] font-medium '+(S.sevColor[sev]||'bg-slate-100 text-slate-600')+'">'+esc(sev)+'</span>'
      + '<span class="flex-1 font-proxima text-[13px] text-slate-800">'+esc(title)+'</span>'
      + '<span class="font-mono text-[10px] uppercase text-slate-400">Triage</span></div>';
    var list = document.getElementById('tixlist');
    list.insertBefore(row.firstChild, list.firstChild);
    mHide();
  };
})();
</script>
<script src="../ds-nav.js"></script>
</body>
</html>
