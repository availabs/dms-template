<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Patterns · TransportNY DMS Design System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="_shared.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="_theme.jsx"></script>
<script type="text/babel" src="_dms.jsx"></script>
</head>
<body class="tny-pane">
<div id="root"></div>
<script type="text/babel" data-presets="react">
const t = window.TNYTheme;

function PatternCard({ kicker, title, desc, children, span = "1/2" }) {
  return (
    <Section span={span} name={kicker} kicker={kicker} title={title}>
      <div className="rounded-[8px] border border-zinc-950/10 bg-white shadow-sm overflow-hidden">
        {desc && <div className="px-4 py-3 border-b border-zinc-950/05 font-proxima text-[12.5px] text-slate-600">{desc}</div>}
        <div className="p-4">{children}</div>
      </div>
    </Section>
  );
}

function EmptyState() {
  return (
    <div className="flex flex-col items-center text-center py-10">
      <div className="size-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 mb-3"><TNYIcon name="Database" className="size-6"/></div>
      <div className="font-display uppercase text-[14px] tracking-wide text-[#0F1722]">No segments in this region</div>
      <div className="font-proxima text-[13px] text-slate-600 mt-1 max-w-sm">Pick a different region in the tone-bar, or upload a custom corridor.</div>
      <div className="mt-4"><Button style="default" icon="Plus">Add corridor</Button></div>
    </div>
  );
}

function LoadingState() {
  return (
    <div className="flex flex-col gap-2 py-2">
      {[0.9, 0.7, 0.5, 0.8].map((w, i) => (
        <div key={i} className="h-3 rounded bg-slate-100 animate-pulse" style={{ width: `${w * 100}%` }}/>
      ))}
    </div>
  );
}

function ErrorState() {
  return (
    <div className="flex items-start gap-3 rounded-[6px] border border-rose-200 bg-rose-50/60 p-4">
      <TNYIcon name="XMark" className="size-5 text-rose-600 mt-0.5"/>
      <div className="flex-1">
        <div className="font-display uppercase text-[13px] tracking-wide text-rose-700">Couldn't load data</div>
        <div className="font-proxima text-[13px] text-slate-600 mt-1">The NPMRDS gateway returned a 502. We'll retry automatically.</div>
        <div className="mt-3"><Button style="secondary" icon="ArrowRight">Retry now</Button></div>
      </div>
    </div>
  );
}

function App() {
  return (
    <Layout style={1} name="app"
      sideNav={<TNYSidebar active="patterns" product="DESIGN"/>}
      footer={<Footer/>}>

      <LayoutGroup style="hero" name="hero">
        <Section span="1" name="intro" kicker="// 04 · COMPOSITIONS">
          <h1 className={`${t.textSettings.styles[0].h1} mb-3`}>Patterns<span className="text-[#CA8A04]">.</span></h1>
          <p className="font-proxima text-[15.5px] text-slate-600 max-w-[760px] leading-[1.65]">
            Multi-primitive compositions that recur across the product. Each Section below
            is one pattern: an empty state, a loading state, a data section with filters, a
            form layout. If a primitive looks wrong in composition (chart colours fight the
            table, button padding doesn't match input padding), this page is where it shows
            up first.
          </p>
        </Section>
      </LayoutGroup>

      {/* ─── STATES ─── */}
      <LayoutGroup style="content" name="states">
        <Section span="1" name="states-heading" kicker="01" title="State patterns"/>

        <PatternCard kicker="EMPTY" title="Empty state" desc="Data section with no rows · icon + message + call-to-action.">
          <EmptyState/>
        </PatternCard>

        <PatternCard kicker="LOADING" title="Loading state" desc="Skeleton placeholder while the section's data is in flight.">
          <LoadingState/>
        </PatternCard>

        <PatternCard kicker="ERROR" title="Error state" desc="Inline error with retry. Doesn't replace the whole card surface.">
          <ErrorState/>
        </PatternCard>

        <PatternCard kicker="STALE" title="Stale-data state" desc="Header pill + pulsing rose dot. Card still renders the last-good values.">
          <div className="flex items-center justify-between px-1 py-1 mb-3">
            <span className="font-display uppercase text-[12.5px] tracking-wide text-[#0F1722]">Hours of Excessive Delay</span>
            <span className="inline-flex items-center gap-1.5 text-[12px] text-rose-700"><span className="size-1.5 rounded-full bg-rose-500 dot-pulse"/>data stale · 2h 14m old</span>
          </div>
          <div className="font-mono text-[28px] font-medium tabular-nums text-[#0F1722]/60">12,468</div>
          <div className="font-mono text-[12px] text-slate-500">last refresh · 06:14 ET</div>
        </PatternCard>
      </LayoutGroup>

      {/* ─── DATA SECTION ─── */}
      <LayoutGroup style="content_tint" name="data-section">
        <Section span="1" name="data-heading" kicker="02" title="Data section with filters"/>
        <Section span="1" name="data-section-full">
          <div className="rounded-[8px] border border-zinc-950/10 bg-white shadow-sm overflow-hidden">
            {/* Section title bar */}
            <div className="h-11 px-3 flex items-center gap-2 border-b border-zinc-950/10 bg-slate-50/60">
              <TNYIcon name="Drag" className="size-3.5 text-slate-400 cursor-grab"/>
              <span className="font-display font-medium text-[14px] text-[#2D3E4C] flex-1">MAP-21 PM3 · MPO leaderboard</span>
              <button className="h-7 px-2.5 inline-flex items-center gap-1.5 rounded border border-zinc-950/10 hover:bg-slate-50 text-slate-700 text-[12px]">Display <TNYIcon name="CaretDown" className="size-3"/></button>
              <button className="h-7 w-7 inline-flex items-center justify-center rounded hover:bg-slate-50 text-slate-500"><TNYIcon name="More" className="size-3.5"/></button>
            </div>
            {/* Filter chrome */}
            <div className="bg-slate-50/40 border-b border-zinc-950/05 px-3 py-2 flex flex-wrap items-center gap-3">
              <span className="font-display uppercase text-[11px] tracking-wide text-slate-500">Filters</span>
              <span className="px-1.5 py-0.5 bg-[#EAAD43]/15 text-amber-800 hover:bg-[#EAAD43]/25 rounded-[4px] text-[11.5px]">MPO · 12 selected</span>
              <span className="px-1.5 py-0.5 bg-[#EAAD43]/15 text-amber-800 hover:bg-[#EAAD43]/25 rounded-[4px] text-[11.5px]">Year · 2024</span>
              <span className="px-1.5 py-0.5 bg-[#EAAD43]/15 text-amber-800 hover:bg-[#EAAD43]/25 rounded-[4px] text-[11.5px]">Road class · Interstate, NHS</span>
              <button className="ml-auto text-[12px] text-[#1F3F8F] hover:text-[#16307A]">+ add filter</button>
            </div>
            {/* Table */}
            <table className="w-full text-[13px]">
              <thead className="bg-slate-50/80 border-b border-zinc-950/10">
                <tr>
                  <th className="px-3 py-2 text-left font-display uppercase text-[11px] tracking-wide text-slate-600">MPO</th>
                  <th className="px-3 py-2 text-left font-display uppercase text-[11px] tracking-wide text-slate-600">LOTTR Pass</th>
                  <th className="px-3 py-2 text-left font-display uppercase text-[11px] tracking-wide text-slate-600">TTTR</th>
                  <th className="px-3 py-2 text-left font-display uppercase text-[11px] tracking-wide text-slate-600">HED</th>
                  <th className="px-3 py-2 text-left font-display uppercase text-[11px] tracking-wide text-slate-600">Δ YoY</th>
                  <th className="px-3 py-2 text-left font-display uppercase text-[11px] tracking-wide text-slate-600">Status</th>
                </tr>
              </thead>
              <tbody>
                {[
                  ["NYMTC",  "82.1%", "1.34", "12,468", "▾ 2.4%", "green",   "PASS"],
                  ["CDTC",   "87.4%", "1.22", "1,420",  "▾ 0.8%", "green",   "PASS"],
                  ["GBNRTC", "78.9%", "1.41", "3,860",  "▴ 1.2%", "amber",   "BELOW"],
                  ["BMTS",   "84.2%", "1.28", "920",    "—",      "green",   "PASS"],
                  ["AGFTC",  "76.4%", "1.49", "640",    "▴ 4.6%", "red",     "FAIL"],
                ].map(([mpo, lottr, tttr, hed, dyoy, color, status]) => (
                  <tr key={mpo} className="border-b border-zinc-950/05 hover:bg-[#FFFBEB]">
                    <td className="px-3 py-2">{mpo}</td>
                    <td className="px-3 py-2 font-mono tabular-nums">{lottr}</td>
                    <td className="px-3 py-2 font-mono tabular-nums">{tttr}</td>
                    <td className="px-3 py-2 font-mono tabular-nums">{hed}</td>
                    <td className="px-3 py-2 font-mono tabular-nums text-slate-600">{dyoy}</td>
                    <td className="px-3 py-2"><Pill style={color}>{status}</Pill></td>
                  </tr>
                ))}
              </tbody>
            </table>
            {/* Pagination */}
            <div className="px-3 h-10 flex items-center justify-between border-t border-zinc-950/05 bg-slate-50/40">
              <span className="font-mono text-[11px] uppercase tracking-wider text-slate-500">5 of 14 MPOs</span>
              <div className="flex items-center gap-1">
                <button className="px-2 py-0.5 text-[12px] text-slate-600 hover:bg-slate-100 rounded">‹</button>
                <button className="px-2 py-0.5 text-[12px] text-[#0F1722] bg-slate-200 rounded font-medium">1</button>
                <button className="px-2 py-0.5 text-[12px] text-slate-600 hover:bg-slate-100 rounded">2</button>
                <button className="px-2 py-0.5 text-[12px] text-slate-600 hover:bg-slate-100 rounded">3</button>
                <button className="px-2 py-0.5 text-[12px] text-slate-600 hover:bg-slate-100 rounded">›</button>
              </div>
            </div>
            {/* Attribution */}
            <div className="w-full px-3 py-1.5 flex gap-2 text-[11px] text-slate-500 font-mono uppercase tracking-wide border-t border-zinc-950/05 bg-slate-50/40">
              SOURCE · <a className="text-[#1F3F8F] hover:text-[#16307A]">NPMRDS 2024 monthly</a> · LAST INGESTED 2026-05-21 06:14 ET
            </div>
          </div>
        </Section>
      </LayoutGroup>

      {/* ─── CARD GRID + FORM ─── */}
      <LayoutGroup style="content" name="card-grid">
        <Section span="1" name="cardgrid-heading" kicker="03" title="Card grid + Form pattern"/>

        <Section span="2/3" name="cardgrid">
          <div className="rounded-[8px] border border-zinc-950/10 bg-white shadow-sm overflow-hidden">
            <div className="h-11 px-3 flex items-center gap-2 border-b border-zinc-950/10 bg-slate-50/60">
              <span className="font-display font-medium text-[14px] text-[#2D3E4C] flex-1">Route analysis · templates</span>
              <button className="h-7 px-2.5 inline-flex items-center gap-1.5 rounded border border-zinc-950/10 hover:bg-slate-50 text-slate-700 text-[12px]">Display <TNYIcon name="CaretDown" className="size-3"/></button>
            </div>
            <div className="p-4 grid grid-cols-2 gap-3">
              {[
                ["Floating Car · 50p Speed",  "Median speed by hour-of-day for a single corridor"],
                ["Reliability · LOTTR",       "Pass/fail by segment for the chosen MPO"],
                ["Congestion · HED + PHED",   "Hours of excessive delay, weekday peaks"],
                ["Work Zones · Active",       "All TMC-overlapping work zones in the period"],
              ].map(([title, desc]) => (
                <a key={title} className="rounded-[6px] border border-zinc-950/10 hover:border-[#37576B] bg-white p-3 transition-colors block">
                  <div className="font-display uppercase text-[13px] tracking-wide text-[#0F1722]">{title}</div>
                  <div className="font-mono text-[10px] uppercase tracking-wider text-slate-500 mt-1">NPMRDS · TEMPLATE</div>
                  <div className="font-proxima text-[12.5px] text-slate-600 mt-2 leading-snug">{desc}</div>
                </a>
              ))}
            </div>
          </div>
        </Section>

        <Section span="1/3" name="form">
          <div className="rounded-[8px] border border-zinc-950/10 bg-white shadow-sm p-6">
            <div className="font-display uppercase text-[16px] tracking-tight text-[#0F1722] mb-5">Run a new report</div>
            <div className="flex flex-col gap-4 mb-5">
              <div>
                <div className="font-display uppercase text-[11px] tracking-[0.16em] text-slate-600 mb-1.5">Template</div>
                <div className="w-full"><div className="flex items-center gap-1.5 min-h-11 px-3 rounded-[6px] border border-zinc-950/15 bg-white cursor-pointer text-[14px] text-[#0F1722]">Floating Car · 50p Speed<TNYIcon name="CaretDown" className="size-3.5 ml-auto text-slate-500"/></div></div>
              </div>
              <div>
                <div className="font-display uppercase text-[11px] tracking-[0.16em] text-slate-600 mb-1.5">Corridor</div>
                <input className={t.input.input} placeholder="Paste TMC list or pick on map…"/>
              </div>
              <div>
                <div className="font-display uppercase text-[11px] tracking-[0.16em] text-slate-600 mb-1.5">Year range</div>
                <div className="flex gap-2 items-center">
                  <input className={t.input.input + " w-24"} defaultValue="2020"/>
                  <span className="font-mono text-slate-400">→</span>
                  <input className={t.input.input + " w-24"} defaultValue="2024"/>
                </div>
              </div>
              <label className="inline-flex items-center gap-2 cursor-pointer">
                <span className="relative inline-flex h-5 w-9 items-center rounded-full bg-[#1F3F8F]"><span className="inline-block h-4 w-4 rounded-full bg-white shadow translate-x-4"/></span>
                <span className="font-proxima text-[13px] text-slate-700">Include MPO benchmarks</span>
              </label>
            </div>
            <div className="flex gap-2 justify-end">
              <Button style="ghost">Cancel</Button>
              <Button style="default" icon="ArrowRight">Run report</Button>
            </div>
          </div>
        </Section>
      </LayoutGroup>

      {/* ─── AUTH + SECTION TOOLBAR ─── */}
      <LayoutGroup style="content_tint" name="auth-toolbar">
        <Section span="1" name="auth-heading" kicker="04" title="Auth + admin chrome"/>

        <Section span="1/2" name="auth">
          <div className="rounded-[8px] border border-zinc-950/10 bg-white shadow-sm p-8">
            <div className="font-display uppercase text-[20px] tracking-tight text-[#0F1722] mb-6">Sign in</div>
            <div className="flex flex-col gap-4 mb-5">
              <div><div className="font-display uppercase text-[11px] tracking-[0.16em] text-slate-600 mb-1.5">Email</div><input className={t.input.input} type="email" placeholder="you@dot.ny.gov"/></div>
              <div><div className="font-display uppercase text-[11px] tracking-[0.16em] text-slate-600 mb-1.5">Password</div><input className={t.input.input} type="password" placeholder="••••••••"/></div>
            </div>
            <Button style="default">Sign in</Button>
            <div className="flex items-center gap-3 my-5 text-[11px] font-mono uppercase tracking-[0.18em] text-slate-400"><span className="flex-1 h-px bg-zinc-950/10"/>or<span className="flex-1 h-px bg-zinc-950/10"/></div>
            <button className="w-full h-11 inline-flex items-center justify-center gap-2 rounded-[6px] border border-zinc-950/15 bg-white hover:bg-slate-50 font-proxima text-[13.5px] text-slate-800">Continue with NY.gov ID</button>
          </div>
        </Section>

        <Section span="1/2" name="section-toolbar">
          <div className="rounded-[8px] border border-zinc-950/10 bg-white shadow-sm overflow-hidden">
            <div className="px-3 py-2 bg-slate-50 border-b border-zinc-950/05 font-display uppercase text-[12.5px] tracking-wide text-[#0F1722]">Pattern · Section toolbar (edit mode)</div>
            <div className="p-4 bg-[#ECEEF2]">
              <div className="relative group">
                {/* Dashed outline overlay (only when hovered in real editor) */}
                <div className="absolute inset-0 border border-dashed border-[#1F3F8F]/40 rounded-[6px] pointer-events-none"/>
                <div className="absolute -top-7 left-0 right-0 flex items-center gap-2">
                  <Pill style="blue"><TNYIcon name="Drag" className="size-3"/>drag</Pill>
                  <Pill style="slate">SECTION · KPI · 1/3</Pill>
                  <div className="flex-1"/>
                  <button className="h-7 w-7 inline-flex items-center justify-center rounded hover:bg-slate-50 text-slate-500 bg-white border border-zinc-950/10"><TNYIcon name="PencilEdit" className="size-3.5"/></button>
                  <button className="h-7 w-7 inline-flex items-center justify-center rounded hover:bg-slate-50 text-slate-500 bg-white border border-zinc-950/10"><TNYIcon name="More" className="size-3.5"/></button>
                </div>
                <div className="rounded-[8px] border border-zinc-950/10 bg-white shadow-sm p-4 mt-4">
                  <div className="font-display uppercase text-[12.5px] tracking-[0.04em] text-slate-500">Total Compliance</div>
                  <div className="font-mono text-[28px] font-medium tabular-nums text-[#0F1722]">86.4%</div>
                  <div className="font-proxima text-[12px] text-slate-500">on target ≥ 82%</div>
                </div>
              </div>
            </div>
          </div>
        </Section>
      </LayoutGroup>
    </Layout>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
