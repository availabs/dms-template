<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Theme · TransportNY DMS Design System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="_shared.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="_theme.jsx"></script>
<script type="text/babel" src="_dms.jsx"></script>
</head>
<body class="tny-pane dms-annotated">
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { TNYIcon } = window;

function Swatch({ hex, name, role }) {
  return (
    <div className="rounded-[6px] overflow-hidden border border-zinc-950/10">
      <div className="h-20" style={{ background: hex }}/>
      <div className="px-3 py-2.5 bg-white">
        <div className="font-display font-medium text-[13px] text-slate-900 uppercase tracking-wide">{name}</div>
        <div className="text-[11px] text-slate-500 font-mono mt-0.5">{hex.toLowerCase()}</div>
        {role && <div className="text-[11.5px] text-slate-600 mt-1.5 leading-snug">{role}</div>}
      </div>
    </div>
  );
}

function TypeSpec({ family, label, sample, size, weight, use }) {
  return (
    <div className="grid grid-cols-[200px_1fr_220px] gap-6 py-5 border-b border-zinc-950/05 items-baseline">
      <div>
        <div className="font-display uppercase text-[11px] tracking-[0.16em] text-slate-500">{label}</div>
        <div className="font-display text-[16px] text-slate-900 mt-1">{family}</div>
        <div className="text-[12px] text-slate-500 font-mono mt-1">{size} / {weight}</div>
      </div>
      <div className={family.includes('Oswald') ? 'font-display' : 'font-proxima'} style={{ fontSize: size, fontWeight: weight, lineHeight: 1.1, color: '#0F1722' }}>{sample}</div>
      <div className="text-[12.5px] text-slate-600 leading-snug">{use}</div>
    </div>
  );
}

function App() {
  return (
    <Layout style={1} name="app"
      sideNav={<TNYSidebar active="theme" product="DESIGN"/>}
      footer={<Footer/>}>

      {/* ─── HERO BAND ─── one Section: a Lexical-style intro ─── */}
      <LayoutGroup style="hero" name="hero">
        <Section span="1" name="page-intro" kicker="// 01 · FOUNDATION">
          <h1 className={`${window.TNYTheme.textSettings.styles[0].h1} mb-3`}>Theme<span className="text-[#CA8A04]">.</span></h1>
          <p className="font-proxima text-[15.5px] text-slate-600 max-w-[680px] leading-[1.65]">
            Color, type, icons, spacing — the foundational tokens every TransportNY
            primitive inherits from. If a token is missing here, it'll be missing
            everywhere that consumes it.
          </p>
        </Section>
      </LayoutGroup>

      {/* ─── CONTENT BAND ─── multiple Sections, each a Card or Lexical ─── */}
      <LayoutGroup style="content" name="content">

        {/* Brand DNA */}
        <Section span="1" name="brand-dna" kicker="01" title="Brand DNA">
          <div className="rounded-[8px] border border-zinc-950/10 bg-white shadow-sm p-6">
            <p className="font-proxima text-[14.5px] text-slate-600 leading-[1.65] mb-5 max-w-[760px]">
              The system is rooted in NYS Department of Transportation visual identity: the
              State silhouette mark, deep public-sector blue, and the warm amber used for
              active state.
            </p>
            <div className="grid grid-cols-3 gap-4">
              <div className="rounded-[6px] border border-zinc-950/10 p-6 flex items-center gap-4 bg-[#12181F]">
                <img src="../../design_handoff_transportny_design_system/assets/nys_logo_white.svg" className="w-12 h-12"/>
                <div>
                  <div className="font-display uppercase text-white text-[15px] tracking-wide">TransportNY</div>
                  <div className="text-[11.5px] text-slate-400 font-mono">Sidebar lockup</div>
                </div>
              </div>
              <div className="rounded-[6px] border border-zinc-950/10 p-6 flex items-center gap-4 bg-white">
                <img src="../../design_handoff_transportny_design_system/assets/nys_logo_blue.svg" className="w-12 h-12 object-contain"/>
                <div>
                  <div className="font-display uppercase text-slate-900 text-[15px] tracking-wide">NYS DOT</div>
                  <div className="text-[11.5px] text-slate-500 font-mono">Light marks</div>
                </div>
              </div>
              <div className="rounded-[6px] border border-zinc-950/10 p-6 bg-[#1F3F8F] text-white flex items-center">
                <div className="font-display font-semibold text-[28px] leading-none">Empire<br/>Civic</div>
              </div>
            </div>
          </div>
        </Section>

        {/* Core palette */}
        <Section span="1" name="core-palette" kicker="02" title="Core Palette">
          <div className="rounded-[8px] border border-zinc-950/10 bg-white shadow-sm p-6">
            <p className="font-proxima text-[13.5px] text-slate-600 mb-5 max-w-[680px]">
              Two-axis system: ink-dark navigation against light editorial canvases, with a
              saturated NYS blue used in filter strips and a yellow active marker.
            </p>
            <div className="grid grid-cols-4 gap-3">
              <Swatch hex="#1F3F8F" name="NYS Blue" role="Primary brand. Tone-bars, primary CTAs, links."/>
              <Swatch hex="#16307A" name="Blue Press" role="Hover & active for primary blue surfaces."/>
              <Swatch hex="#0F2D4D" name="Ink Navy" role="Table headers, callouts, deep accents."/>
              <Swatch hex="#12181F" name="Sidebar Ink" role="Persistent left rail. Always paired with white text."/>
              <Swatch hex="#0A0E13" name="Logo Plate" role="Top of sidebar, behind NYS mark."/>
              <Swatch hex="#FACC15" name="Active Amber" role="Selected nav, highlighted toolbar buttons."/>
              <Swatch hex="#EAAD43" name="Underline Amber" role="Section heading underline, anchored TOC."/>
              <Swatch hex="#37576B" name="Slate Tag" role="Avatar gradient base, status chips."/>
            </div>
          </div>
        </Section>

        {/* Data viz */}
        <Section span="1" name="data-viz" kicker="03" title="Data Visualization">
          <div className="rounded-[8px] border border-zinc-950/10 bg-white shadow-sm p-6">
            <p className="font-proxima text-[13.5px] text-slate-600 mb-5 max-w-[680px]">
              Chart palettes are split into a categorical set (for series swatches) and a
              sequential MPH ramp used on speed maps. Never use brand blue inside charts.
            </p>
            <div className="font-display uppercase text-[11px] tracking-wide text-slate-500 mb-2">Categorical · max 5 series</div>
            <div className="grid grid-cols-5 gap-3">
              <Swatch hex="#6F6F6F" name="Cat 1"/>
              <Swatch hex="#E5A646" name="Cat 2"/>
              <Swatch hex="#94C24E" name="Cat 3"/>
              <Swatch hex="#E160A4" name="Cat 4"/>
              <Swatch hex="#F2CB3D" name="Cat 5"/>
            </div>
            <div className="font-display uppercase text-[11px] tracking-wide text-slate-500 mt-6 mb-2">Sequential speed ramp · slowest → freeflow</div>
            <div className="grid grid-cols-5 gap-3">
              <Swatch hex="#D6453B" name="42.12–42.46" role="Slowest"/>
              <Swatch hex="#E8843F" name="42.46–44.41"/>
              <Swatch hex="#F2E18A" name="44.41–47.14"/>
              <Swatch hex="#A8D26B" name="47.14–49.62"/>
              <Swatch hex="#3FA34D" name="49.62–50.61" role="Freeflow"/>
            </div>
          </div>
        </Section>

        {/* Surface */}
        <Section span="1" name="surface" kicker="04" title="Surface & Canvas">
          <div className="rounded-[8px] border border-zinc-950/10 bg-white shadow-sm p-6">
            <p className="font-proxima text-[13.5px] text-slate-600 mb-5 max-w-[680px]">
              The page is a grey pane that floats white cards. Three z-layers: ink sidebar,
              grey content pane, white card. A fourth bone-tinted card is reserved for
              editorial / jurisdictional documents.
            </p>
            <div className="grid grid-cols-4 gap-3">
              <Swatch hex="#ECEEF2" name="Content Pane" role="Body background under every card."/>
              <Swatch hex="#E4E8EE" name="Pane Tint" role="Alternating sections."/>
              <Swatch hex="#FFFFFF" name="Card" role="Default surface. 8-px radius, 1-px hairline, single soft shadow."/>
              <Swatch hex="#FAFBFC" name="Card Tint" role="Inner panel inside a card."/>
            </div>

            <div className="font-display uppercase text-[11px] tracking-wide text-slate-500 mt-6 mb-2">The cards-on-pane rule</div>
            <div className="grid grid-cols-2 gap-4 mt-2">
              <div className="rounded-[6px] p-4 bg-[#ECEEF2] border border-zinc-950/10">
                <div className="tny-card p-4">
                  <div className="font-mono uppercase text-[10.5px] tracking-[0.2em] text-[#CA8A04]">// GOOD</div>
                  <div className="font-proxima text-[13px] text-slate-700 mt-1.5">Section bg is pane (#ECEEF2). Content lives in a card with a hairline edge.</div>
                </div>
              </div>
              <div className="rounded-[6px] p-4 bg-white border border-rose-300/50">
                <div className="bg-slate-50 border border-zinc-950/05 p-4">
                  <div className="font-mono uppercase text-[10.5px] tracking-[0.2em] text-rose-500">// BAD</div>
                  <div className="font-proxima text-[13px] text-slate-700 mt-1.5">Wall-to-wall white. No edge between section and content. Don't do this.</div>
                </div>
              </div>
            </div>
          </div>
        </Section>

        {/* Typography */}
        <Section span="1" name="typography" kicker="05" title="Typography · textSettings.styles[0]">
          <div className="rounded-[8px] border border-zinc-950/10 bg-white shadow-sm p-6">
            <p className="font-proxima text-[13.5px] text-slate-600 mb-2 max-w-[680px]">
              Two families. Oswald is a condensed display face — chrome, headings, tabular
              labels. Proxima Nova handles all running prose and form copy. Every key in this
              specimen exists in <span className="tny-mono">textSettings.styles[0]</span>.
            </p>
            <div className="mt-4 divide-y divide-zinc-950/05">
              <TypeSpec family="Oswald 600"        label="h1 · Display"     size="52px"   weight={600} sample="Getting Started"          use="Page hero. Hero LayoutGroup."/>
              <TypeSpec family="Oswald 600"        label="h2 · Section"     size="38px"   weight={600} sample="WHEN TO USE EACH TOOL"    use="Data section starts inside dashboards."/>
              <TypeSpec family="Oswald 600"        label="h3 · Subsection"  size="28px"   weight={600} sample="Total Congestion Cost"    use="Card titles and panel heads."/>
              <TypeSpec family="Oswald 500"        label="nav · Glyph"      size="13.5px" weight={500} sample="ROUTE ANALYSIS"            use="Sidebar items, breadcrumbs, tab pills."/>
              <TypeSpec family="Proxima Nova 400"  label="body"             size="14.5px" weight={400} sample="Welcome to the documentation for the NPMRDS platform." use="All running prose. Line-height 1.65, max-w 680px."/>
              <TypeSpec family="Proxima Nova 400"  label="caption"          size="12.5px" weight={400} sample="vs previous month / day"  use="Card subtitles, TOC items, footnotes."/>
              <TypeSpec family="Mono 500"          label="numLG · Numeric"  size="22px"   weight={500} sample="1,265 · 40.8/day"          use="KPI value pairs. Tabular numerals enforced."/>
              <TypeSpec family="Mono 400"          label="kicker"           size="10.5px" weight={400} sample="// 01 · FOUNDATION"        use='The "// 01" labels that mark section heads.'/>
            </div>
          </div>
        </Section>

        {/* Icons */}
        <Section span="1" name="icons" kicker="06" title="Icons · the registry">
          <div className="rounded-[8px] border border-zinc-950/10 bg-white shadow-sm p-6">
            <p className="font-proxima text-[13.5px] text-slate-600 mb-2 max-w-[680px]">
              Icons are referenced <em>by name</em>, never by import. The names are the API:
              a theme entry like <span className="tny-mono">{`{ caretIcon: "CaretDown" }`}</span>{" "}
              resolves against this registry. Add a new icon to <span className="tny-mono">theme/icons.js</span>{" "}
              and it's instantly available to every primitive that references it.
            </p>
            <div className="grid grid-cols-6 gap-3 mt-5">
              {[
                "Pages","Sections","Settings","History","Search","Database",
                "CaretDown","CaretUp","ChevronRight","ChevronLeft","ArrowRight","User",
                "Plus","XMark","Check","Filter","Download","More",
                "Drag","MapLayers","MapPin","Activity","Grid","SortAsc",
              ].map((n) => (
                <div key={n} className="flex flex-col items-center gap-1.5 py-3 rounded-[6px] hover:bg-slate-50">
                  <TNYIcon name={n} className="size-6 text-slate-700"/>
                  <span className="font-mono text-[10px] uppercase tracking-wide text-slate-500">{n}</span>
                </div>
              ))}
            </div>
          </div>
        </Section>

        {/* Elevation & Motion */}
        <Section span="1" name="elevation" kicker="07" title="Elevation, Radius & Motion">
          <div className="rounded-[8px] border border-zinc-950/10 bg-white shadow-sm p-6">
            <p className="font-proxima text-[13.5px] text-slate-600 mb-5 max-w-[680px]">
              A single subtle elevation step on cards; a heavier one on popovers and menus.
              Radii stay small (4–8 px) — this is institutional software, not consumer.
            </p>
            <div className="grid grid-cols-3 gap-4">
              <div className="rounded-[8px] border border-zinc-950/10 bg-white p-6 shadow-sm">
                <div className="font-display uppercase text-[11px] text-slate-500 tracking-wider">Card</div>
                <div className="font-mono text-[12px] text-slate-700 mt-1">radius 8 · shadow-sm</div>
              </div>
              <div className="rounded-[8px] border border-zinc-950/10 bg-white p-6 shadow-lg">
                <div className="font-display uppercase text-[11px] text-slate-500 tracking-wider">Popover</div>
                <div className="font-mono text-[12px] text-slate-700 mt-1">radius 8 · shadow-lg</div>
              </div>
              <div className="rounded-full border border-zinc-950/10 bg-white px-4 py-3 shadow-xl flex items-center gap-2">
                <TNYIcon name="Database" className="size-4 text-slate-500"/>
                <div className="font-mono text-[12px] text-slate-700">Floating dock · rounded-full · shadow-xl</div>
              </div>
            </div>
            <div className="mt-6 grid grid-cols-3 gap-6">
              <div>
                <span className="font-display uppercase text-[11px] text-slate-500 tracking-wider block">Hover</span>
                <span className="font-mono text-[12.5px] text-slate-700">120ms ease-out</span>
              </div>
              <div>
                <span className="font-display uppercase text-[11px] text-slate-500 tracking-wider block">Tone-bar press</span>
                <span className="font-mono text-[12.5px] text-slate-700">80ms · border drops 2 px (mass effect)</span>
              </div>
              <div>
                <span className="font-display uppercase text-[11px] text-slate-500 tracking-wider block">Popover open</span>
                <span className="font-mono text-[12.5px] text-slate-700">140ms · opacity + 6 px translateY</span>
              </div>
            </div>
          </div>
        </Section>
      </LayoutGroup>
    </Layout>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
