<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NPMRDS · Getting Started · TransportNY</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="../design-system/_shared.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="../design-system/_theme.jsx"></script>
<script type="text/babel" src="../design-system/_dms.jsx"></script>
</head>
<body class="tny-pane">
<div id="root"></div>
<script type="text/babel" data-presets="react">
/* NPMRDS · Getting Started · public-facing landing
 *
 * Demonstrates: app Layout + hero LayoutGroup (with compact Region
 * action) + two content LayoutGroups (Regional analysis · 3 subgroups
 * and Route analysis templates · 4 templates). Every primitive here
 * is also in design-system/components.html; the card-grid composition
 * is documented in design-system/patterns.html. */

const t = window.TNYTheme;
const { TNYIcon } = window;

const REGIONAL = [
  {
    kicker: "01", title: "Floating Car",
    cards: [
      { title: "50p Speed", desc: "Median speed by hour-of-day for a single corridor.", icon: "Activity" },
      { title: "Free-flow",  desc: "Off-peak baseline used by reliability calculations.",   icon: "MapLayers" },
      { title: "Travel Time", desc: "Origin-destination travel time on selected hours.",    icon: "History" },
    ],
  },
  {
    kicker: "02", title: "Reliability",
    cards: [
      { title: "LOTTR",     desc: "Level of Travel Time Reliability; pass/fail vs FHWA target.", icon: "Activity" },
      { title: "TTTR",      desc: "Truck Travel Time Reliability on Interstate corridors.",      icon: "Database" },
      { title: "Delay",     desc: "Mean and percentile delay against the free-flow baseline.",   icon: "MapPin" },
    ],
  },
  {
    kicker: "03", title: "Congestion",
    cards: [
      { title: "HED + PHED", desc: "Hours of excessive delay in urbanized areas.",         icon: "Activity" },
      { title: "Weekday peaks", desc: "AM/PM peak-period delay by hour of day.",            icon: "History" },
      { title: "Bottleneck atlas", desc: "Top-50 congested corridors statewide, monthly.",  icon: "MapLayers" },
    ],
  },
];

const TEMPLATES = [
  { title: "Floating Car · 50p Speed",   desc: "Median speed by hour-of-day for one corridor", kicker: "TEMPLATE · NPMRDS" },
  { title: "Reliability · LOTTR",        desc: "Pass/fail by segment for the chosen MPO",      kicker: "TEMPLATE · NPMRDS" },
  { title: "Congestion · HED + PHED",    desc: "Hours of excessive delay, weekday peaks",      kicker: "TEMPLATE · NPMRDS" },
  { title: "Work Zones · Active",        desc: "TMC-overlapping work zones in the period",     kicker: "TEMPLATE · NPMRDS" },
];

function App() {
  return (
    <Layout style={1} name="app"
      sideNav={<TNYSidebar active="home" product="NPMRDS"
        nav={[
          { id: "home",       label: "Home",       icon: "Pages",     href: "#" },
          { id: "routes",     label: "Routes",     icon: "MapLayers", href: "#" },
          { id: "reports",    label: "Reports",    icon: "Sections",  href: "#" },
          { id: "macro",      label: "Macro",      icon: "MapPin",    href: "#" },
          { id: "pm3",        label: "MAP-21 PM3", icon: "Activity",  href: "map-21-pm3.html" },
          { id: "batch",      label: "Batch",      icon: "Database",  href: "#" },
        ]}/>}
      footer={<Footer/>}>

      {/* Hero with a compact Region action in the right slot */}
      <LayoutGroup style="hero" name="hero">
        <Section span="1" name="hero" kicker="NPMRDS · GETTING STARTED">
          <div className="flex items-end justify-between gap-8">
            <div className="max-w-[760px]">
              <h1 className="font-display font-semibold text-[#0F1722] text-[52px] leading-[1.02] tracking-tight">Getting Started<span className="text-[#CA8A04]">.</span></h1>
              <p className="font-proxima text-slate-600 text-[15px] leading-[1.65] mt-4 max-w-[640px]">
                Two ways to explore NPMRDS data: <strong className="text-[#0F1722]">regional analysis</strong>{" "}
                for a chosen region or MPO, and <strong className="text-[#0F1722]">route-analysis templates</strong>{" "}
                for a corridor you pick. Pick one to start.
              </p>
            </div>
            <div className="flex items-center gap-2">
              <div className="flex items-center gap-1.5 h-8 px-2.5 rounded-[6px] border border-zinc-950/10 hover:border-[#37576B] bg-white text-[12px] cursor-pointer">
                <span className="font-display uppercase text-[10px] tracking-wide text-slate-500">Region</span>
                <span className="text-[12px] text-slate-700 font-medium">All NYS</span>
                <TNYIcon name="CaretDown" className="size-3 text-slate-500"/>
              </div>
              <Button style="secondary" icon="Search">Search routes</Button>
            </div>
          </div>
        </Section>
      </LayoutGroup>

      {/* Regional analysis · 3 subgroups */}
      <LayoutGroup style="content" name="regional">
        <Section span="1" name="regional-heading" kicker="// 01" title="Regional analysis"/>
        {REGIONAL.map((group) => (
          <Section key={group.title} span="1" name={`group-${group.title}`}>
            <div className="rounded-[8px] border border-zinc-950/10 bg-white shadow-sm overflow-hidden">
              <div className="h-11 px-3 flex items-center gap-2 border-b border-zinc-950/10 bg-slate-50/60">
                <span className="font-mono uppercase text-[10.5px] tracking-[0.2em] text-[#CA8A04]">// {group.kicker}</span>
                <span className="font-display font-medium text-[14px] text-[#2D3E4C]">{group.title}</span>
                <span className="ml-auto text-[12px] text-slate-500">{group.cards.length} reports</span>
              </div>
              <div className="p-4 grid grid-cols-3 gap-3">
                {group.cards.map((c) => (
                  <a key={c.title} className="rounded-[6px] border border-zinc-950/10 hover:border-[#37576B] bg-white p-4 transition-colors block">
                    <div className="flex items-start gap-3">
                      <div className="size-9 rounded-[6px] bg-[#1F3F8F]/10 text-[#1F3F8F] flex items-center justify-center flex-shrink-0">
                        <TNYIcon name={c.icon} className="size-5"/>
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="font-display uppercase text-[13px] tracking-wide text-[#0F1722]">{c.title}</div>
                        <div className="font-proxima text-[12.5px] text-slate-600 mt-1 leading-snug">{c.desc}</div>
                      </div>
                      <TNYIcon name="ArrowRight" className="size-4 text-slate-400 mt-1"/>
                    </div>
                  </a>
                ))}
              </div>
            </div>
          </Section>
        ))}
      </LayoutGroup>

      {/* Route analysis templates · 4 templates */}
      <LayoutGroup style="content_tint" name="templates">
        <Section span="1" name="templates-heading" kicker="// 02" title="Route analysis templates"/>
        {TEMPLATES.map((t, i) => (
          <Section key={t.title} span="1/2" name={`template-${i}`}>
            <a className="rounded-[8px] border border-zinc-950/10 hover:border-[#37576B] bg-white shadow-sm p-5 transition-colors block">
              <div className="font-mono uppercase text-[10.5px] tracking-[0.2em] text-[#CA8A04]">// {t.kicker}</div>
              <div className="font-display uppercase text-[18px] tracking-tight text-[#0F1722] mt-1">{t.title}</div>
              <div className="font-proxima text-[13.5px] text-slate-600 mt-2 leading-relaxed">{t.desc}</div>
              <div className="mt-4 inline-flex items-center gap-2 text-[12.5px] text-[#1F3F8F] hover:text-[#16307A] font-medium"><TNYIcon name="ArrowRight" className="size-4"/>Run on a corridor</div>
            </a>
          </Section>
        ))}
      </LayoutGroup>

      {/* Editorial reference card · brand's chosen accent */}
      <LayoutGroup style="content" name="editorial">
        <Section span="2/3" name="editorial-note">
          <div className="rounded-[8px] border-2 border-dashed border-amber-300 bg-[#F5F1E8] p-8">
            <div className="font-display uppercase font-bold text-[14px] tracking-wide text-[#0F1722] border-b-2 border-[#EAAD43] inline-block pb-0.5">PUBLIC-READ ACCESS</div>
            <p className="font-proxima text-[14px] text-slate-700 mt-4 leading-[1.65]">
              You're browsing without signing in. All published dashboards and reports are
              available; <a className="tny-link">sign in with NY.gov ID</a> to save corridors,
              schedule batch reports, and access internal datasets.
            </p>
          </div>
        </Section>
        <Section span="1/3" name="status">
          <div className="rounded-[8px] border border-zinc-950/10 bg-white shadow-sm p-5">
            <div className="font-display uppercase text-[13px] tracking-wide text-[#0F1722] mb-3">System status</div>
            <div className="flex flex-col gap-2 text-[13px]">
              <div className="flex items-center justify-between"><span className="text-slate-700">NPMRDS feed</span><span className="inline-flex items-center gap-1.5 text-[12px] text-emerald-700"><span className="size-1.5 rounded-full bg-emerald-500"/>current</span></div>
              <div className="flex items-center justify-between"><span className="text-slate-700">Route engine</span><span className="inline-flex items-center gap-1.5 text-[12px] text-emerald-700"><span className="size-1.5 rounded-full bg-emerald-500"/>current</span></div>
              <div className="flex items-center justify-between"><span className="text-slate-700">Batch queue</span><span className="inline-flex items-center gap-1.5 text-[12px] text-amber-700"><span className="size-1.5 rounded-full bg-amber-400"/>delayed 4 min</span></div>
            </div>
          </div>
        </Section>
      </LayoutGroup>
    </Layout>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
