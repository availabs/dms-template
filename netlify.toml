[build]
  command = "npm run build"
  #functions = "netlify/functions"
  publish = "dist"

  ## Security response headers (applied to every route).
  ## - X-Frame-Options / frame-ancestors: anti-clickjacking (Qualys WAS 150124).
  ##   SAMEORIGIN / 'self' blocks third-party framing while allowing the site to
  ##   frame its own content. Tighten to DENY / 'none' if no self-framing is needed.
  ## - Cross-Origin-Opener-Policy: defense-in-depth for reverse tabnabbing (150222);
  ##   the primary fix for that finding is rel="noopener noreferrer" on links in app code.
  [[headers]]
    for = "/*"
    [headers.values]
      X-Frame-Options = "SAMEORIGIN"
      Content-Security-Policy = "frame-ancestors 'self'"
      Cross-Origin-Opener-Policy = "same-origin-allow-popups"
      X-Content-Type-Options = "nosniff"
      Referrer-Policy = "strict-origin-when-cross-origin"

  ## Uncomment to use this redirect for Single Page Applications like create-react-app.
  ## Not needed for static site generators.
  [[redirects]]
    from = "/*"
    to = "/index.html"
    status = 200

  ## (optional) Settings for Netlify Dev
  ## https://github.com/netlify/cli/blob/main/docs/netlify-dev.md#project-detection
  #[dev]
  #  command = "yarn start" # Command to start your dev server
  #  port = 3000 # Port that the dev server will be listening on
  #  publish = "dist" # Folder with the static content for _redirect file

  ## more info on configuring this file: https://www.netlify.com/docs/netlify-toml-reference/
